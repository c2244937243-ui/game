<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成大西瓜 - 1比1还原版</title>
    <!-- 引入强大的 Matter.js 物理引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333; /* 外围深色背景 */
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* 防止手机端滑动页面 */
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 400px;
            height: 700px;
            background: linear-gradient(135deg, #fff0dc 0%, #ffd8a8 100%); /* 换成更高级的渐变暖色背景 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            /* 居中并保持比例缩放 */
            transform-origin: center center;
        }

        .header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none; /* 防止挡住点击事件 */
        }

        .ui-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 15px;
            border-radius: 15px;
            font-weight: bold;
            color: #775533;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 2px solid #fff;
        }

        .ui-box span.label {
            display: block;
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        #score {
            font-size: 26px;
            color: #ff6b6b;
            font-family: monospace;
        }

        #next-fruit-display {
            font-size: 32px;
            line-height: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 游戏结束弹窗 */
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px);
        }

        .modal {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 4px solid #ffe8c3;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal h2 { margin: 0 0 15px 0; color: #ff6b6b; font-size: 36px; }
        .modal p { font-size: 20px; color: #666; margin-bottom: 25px; }
        #final-score { font-size: 28px; color: #ff6b6b; font-weight: bold; }

        .modal button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .modal button:active { 
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <!-- 顶部 UI 区域 -->
    <div class="header">
        <div class="ui-box">
            <span class="label">当前分数</span>
            <span id="score">0</span>
        </div>
        <div class="ui-box">
            <span class="label">下一个</span>
            <div id="next-fruit-display">🍇</div>
        </div>
    </div>

    <!-- 游戏画布 -->
    <canvas id="game-canvas" width="400" height="700"></canvas>

    <!-- 游戏结束画面 -->
    <div id="game-over">
        <div class="modal">
            <h2>游戏结束! 🍉</h2>
            <p>最终得分: <br><span id="final-score">0</span></p>
            <button onclick="restart()">再玩一局</button>
        </div>
    </div>
</div>

<script>
    // --- 屏幕适配逻辑：确保在任何设备上都能完美缩放并居中 ---
    function adjustScale() {
        const wrapper = document.getElementById('game-wrapper');
        // 游戏原生分辨率是 400x700
        const scale = Math.min(window.innerWidth / 400, window.innerHeight / 700);
        // 如果屏幕比较小，就缩放；如果屏幕大，就保持原样
        if (scale < 1) {
            wrapper.style.transform = `scale(${scale})`;
        } else {
            wrapper.style.transform = `scale(1)`;
        }
    }
    window.addEventListener('resize', adjustScale);
    adjustScale(); // 初始化调用一次

    // --- 物理引擎及游戏逻辑 ---
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Events = Matter.Events;

    // 水果配置数据 (加入3D渐变色和高光配置，L=亮部, B=基色, D=暗部)
    const FRUITS = [
        { emoji: '🍇', radius: 16, score: 1,    colorL: '#d8b4fe', colorB: '#a855f7', colorD: '#7e22ce' }, // 0
        { emoji: '🍒', radius: 24, score: 2,    colorL: '#fca5a5', colorB: '#ef4444', colorD: '#b91c1c' }, // 1
        { emoji: '🍊', radius: 32, score: 4,    colorL: '#fdba74', colorB: '#f97316', colorD: '#c2410c' }, // 2
        { emoji: '🍋', radius: 40, score: 8,    colorL: '#fef08a', colorB: '#eab308', colorD: '#a16207' }, // 3
        { emoji: '🥝', radius: 48, score: 16,   colorL: '#bbf7d0', colorB: '#22c55e', colorD: '#15803d' }, // 4
        { emoji: '🍅', radius: 56, score: 32,   colorL: '#fda4af', colorB: '#f43f5e', colorD: '#be123c' }, // 5
        { emoji: '🍑', radius: 66, score: 64,   colorL: '#fbcfe8', colorB: '#ec4899', colorD: '#be185d' }, // 6
        { emoji: '🍍', radius: 76, score: 128,  colorL: '#fde047', colorB: '#ca8a04', colorD: '#854d0e' }, // 7
        { emoji: '🥥', radius: 88, score: 256,  colorL: '#f5f5f4', colorB: '#d6d3d1', colorD: '#a8a29e' }, // 8
        { emoji: '🍈', radius: 102, score: 512, colorL: '#d9f99d', colorB: '#84cc16', colorD: '#4d7c0f' }, // 9
        { emoji: '🍉', radius: 120, score: 1024, colorL: '#fca5a5', colorB: '#ef4444', colorD: '#991b1b', rind: '#15803d' }  // 10
    ];

    // 初始化物理引擎
    const engine = Engine.create();
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // 调整物理引擎参数使其更有弹性
    engine.gravity.y = 1.2;

    // 游戏状态
    let score = 0;
    let currentLevel = getRandomFruitLevel();
    let nextLevel = getRandomFruitLevel();
    let isDropping = false;
    let gameOver = false;
    let gameOverTimer = 0;
    let previewX = canvas.width / 2; // 顶部瞄准线的X坐标

    // --- 创建边界墙壁 ---
    const wallOptions = { isStatic: true, render: { fillStyle: '#d4a373' } };
    // 左墙、右墙、地板 (放到画面边缘之外或底部)
    const ground = Bodies.rectangle(200, 715, 400, 50, wallOptions); 
    const leftWall = Bodies.rectangle(-25, 350, 50, 800, wallOptions);
    const rightWall = Bodies.rectangle(425, 350, 50, 800, wallOptions);
    Composite.add(engine.world, [ground, leftWall, rightWall]);

    // 随机生成掉落水果 (前5种: 0到4)
    function getRandomFruitLevel() {
        return Math.floor(Math.random() * 5); 
    }

    // 更新UI显示
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('next-fruit-display').innerText = FRUITS[nextLevel].emoji;
    }

    // --- 核心：合成碰撞逻辑 ---
    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            const bodyA = pair.bodyA;
            const bodyB = pair.bodyB;

            // 检查是不是同等级的水果
            if (bodyA.fruitLevel !== undefined && bodyA.fruitLevel === bodyB.fruitLevel) {
                // 防止一帧内重复触发合成
                if (bodyA.isMerging || bodyB.isMerging) return;
                bodyA.isMerging = true;
                bodyB.isMerging = true;

                const newLevel = bodyA.fruitLevel + 1;
                
                // 如果还没合到大西瓜
                if (newLevel < FRUITS.length) {
                    // 取两者的中间点作为新水果的位置
                    const newX = (bodyA.position.x + bodyB.position.x) / 2;
                    const newY = (bodyA.position.y + bodyB.position.y) / 2;

                    // 从物理世界移除旧水果
                    Composite.remove(engine.world, [bodyA, bodyB]);

                    // 创建升级后的新水果
                    const fruitData = FRUITS[newLevel];
                    const newFruit = Bodies.circle(newX, newY, fruitData.radius, {
                        restitution: 0.2, // 弹性
                        friction: 0.1,    // 摩擦力小一点容易滑下去
                        fruitLevel: newLevel
                    });

                    Composite.add(engine.world, newFruit);
                    score += fruitData.score;
                    updateUI();
                } else {
                    // 如果是两个大西瓜合体 -> 终极爆开，直接消失并加超高分！
                    Composite.remove(engine.world, [bodyA, bodyB]);
                    score += 2048;
                    updateUI();
                }
            }
        });
    });

    // --- 死亡判定：红线逻辑 ---
    Events.on(engine, 'afterUpdate', () => {
        if (gameOver) return;
        
        let isAboveLine = false;
        const bodies = Composite.allBodies(engine.world);
        
        for (let body of bodies) {
            if (body.fruitLevel !== undefined) {
                // 150 是危险红线的Y坐标
                // 我们判断水果顶部是否越过红线
                if (body.position.y - FRUITS[body.fruitLevel].radius < 150) {
                    // 并且水果基本处于静止状态 (防止掉落途中的误判)
                    if (Math.abs(body.velocity.y) < 0.2 && Math.abs(body.velocity.x) < 0.2) {
                        isAboveLine = true;
                        break;
                    }
                }
            }
        }

        // 如果停留越线超过 120 帧 (约2秒)
        if (isAboveLine) {
            gameOverTimer++;
            if (gameOverTimer > 120) {
                triggerGameOver();
            }
        } else {
            // 安全就重置倒计时
            gameOverTimer = 0; 
        }
    });

    // 触发游戏结束
    function triggerGameOver() {
        gameOver = true;
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over').style.display = 'flex';
    }

    // 重新开始游戏
    window.restart = function() {
        // 清空所有水果
        const bodies = Composite.allBodies(engine.world);
        const fruitBodies = bodies.filter(b => b.fruitLevel !== undefined);
        Composite.remove(engine.world, fruitBodies);
        
        // 重置状态
        score = 0;
        gameOver = false;
        gameOverTimer = 0;
        isDropping = false;
        currentLevel = getRandomFruitLevel();
        nextLevel = getRandomFruitLevel();
        updateUI();
        
        document.getElementById('game-over').style.display = 'none';
    };

    // --- 玩家操作：瞄准与掉落 ---
    function updatePreviewPosition(e) {
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        // 因为外层可能有CSS scale，所以要把 clientX 转换成实际内部 400px 的坐标
        const scaleX = 400 / rect.width;
        previewX = (e.clientX - rect.left) * scaleX;
    }

    // 触摸/鼠标按下
    canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        updatePreviewPosition(e);
    });

    // 拖动瞄准
    canvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        if (e.buttons > 0 || e.pointerType === 'touch') {
            updatePreviewPosition(e);
        }
    });

    // 松手掉落
    canvas.addEventListener('pointerup', (e) => {
        e.preventDefault();
        if (gameOver || isDropping) return;
        updatePreviewPosition(e);
        dropFruit(previewX);
    });

    // 掉落逻辑
    function dropFruit(x) {
        isDropping = true;
        const fruit = FRUITS[currentLevel];
        
        // 边界限制，防止水果卡进墙里
        const wallThickness = 25;
        x = Math.max(wallThickness + fruit.radius, Math.min(canvas.width - wallThickness - fruit.radius, x));

        // 生成真实掉落的水果 (初始Y位置在顶部 50 的地方)
        const newBody = Bodies.circle(x, 50, fruit.radius, {
            restitution: 0.2,
            friction: 0.1,
            fruitLevel: currentLevel
        });
        
        Composite.add(engine.world, newBody);

        // 切换到下一个
        currentLevel = nextLevel;
        nextLevel = getRandomFruitLevel();
        updateUI();

        // 冷却时间 (0.8秒后才能再次丢水果)
        setTimeout(() => {
            isDropping = false;
        }, 800);
    }

    // --- 自定义渲染引擎 (完美绘制 Emoji 和背景色) ---
    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制危险红线
        ctx.beginPath();
        ctx.moveTo(0, 150);
        ctx.lineTo(canvas.width, 150);
        ctx.setLineDash([12, 12]);
        // 如果快要越线了，红线会变深警告
        ctx.strokeStyle = gameOverTimer > 0 ? '#ff0000' : 'rgba(255, 100, 100, 0.4)'; 
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.setLineDash([]); // 恢复实线

        // 绘制顶部预览水果 (未掉落状态)
        if (!isDropping && !gameOver) {
            const fruit = FRUITS[currentLevel];
            const wallThickness = 25;
            let safeX = Math.max(wallThickness + fruit.radius, Math.min(canvas.width - wallThickness - fruit.radius, previewX));

            ctx.save();
            ctx.translate(safeX, 50); // 预览位置固定在 Y=50
            
            // 画一条往下指引的瞄准虚线
            ctx.beginPath();
            ctx.moveTo(0, fruit.radius);
            ctx.lineTo(0, canvas.height);
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);

            // 半透明绘制预览水果
            ctx.globalAlpha = 0.8;
            drawFruitShape(ctx, fruit, 0, 0);
            ctx.restore();
        }

        // 遍历所有物理刚体并绘制
        const bodies = Composite.allBodies(engine.world);
        for (let body of bodies) {
            if (body.fruitLevel !== undefined) {
                // 绘制水果
                const fruit = FRUITS[body.fruitLevel];
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                
                // 完全不透明绘制真实水果
                ctx.globalAlpha = 1.0;
                drawFruitShape(ctx, fruit, 0, 0);
                
                ctx.restore();
            } else if (body.isStatic) {
                // 绘制地板
                ctx.fillStyle = body.render.fillStyle || '#d4a373';
                const w = body.bounds.max.x - body.bounds.min.x;
                const h = body.bounds.max.y - body.bounds.min.y;
                ctx.fillRect(body.bounds.min.x, body.bounds.min.y, w, h);
            }
        }

        // 循环下一帧
        requestAnimationFrame(renderLoop);
    }

    // 辅助函数：绘制单个水果 (纯 Emoji 极简版)
    function drawFruitShape(ctx, fruit, x, y) {
        // 居中绘制 Emoji，字体大小直接拉满到物理碰撞圆的直径 (半径的2倍)
        ctx.font = `${fruit.radius * 2}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // 保留一点点小阴影，让水果从背景里浮出来，更有质感
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetY = 3;
        
        // Y轴加一点点微调，让 Emoji 的视觉中心对准物理引擎的圆心
        ctx.fillText(fruit.emoji, x, y + fruit.radius * 0.1); 
        
        // 用完赶紧恢复阴影设置，别影响画其他东西（比如红线）
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
    }

    // 初始化游戏界面
    updateUI();

    // 启动物理引擎和渲染循环
    Runner.run(Runner.create(), engine);
    requestAnimationFrame(renderLoop);

</script>
</body>
</html>
