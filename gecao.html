<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>割草特工队 - 职业觉醒版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #xp-bar-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 50%; height: 20px; background-color: rgba(0, 0, 0, 0.5); border: 2px solid #4a4e69; border-radius: 10px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00b4d8, #0077b6); transition: width 0.2s; }
        #level-text { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        #timer-text { position: absolute; top: 12px; left: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #settings-btn { position: absolute; top: 12px; right: 20px; background-color: #4a4e69; color: white; border: 2px solid #fff; border-radius: 8px; padding: 5px 15px; font-size: 18px; cursor: pointer; pointer-events: auto; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        #settings-btn:hover { background-color: #e94560; }
        #gm-btn { position: absolute; top: 55px; right: 20px; background-color: #fca311; color: #1a1a2e; border: 2px solid #fff; border-radius: 8px; padding: 5px 15px; font-size: 18px; cursor: pointer; pointer-events: auto; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-weight: bold; }
        #gm-btn:hover { background-color: #ffb703; }

        .gm-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 5px 10px; margin-bottom: 5px; border-radius: 5px; }
        .gm-actions button { background: #4cc9f0; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; color: #1a1a2e; }
        .gm-actions button.max { background: #ff5c77; color: white; }
        .gm-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background-color: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; pointer-events: auto; display: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.6); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(22, 33, 62, 0.95); padding: 30px; border-radius: 15px; border: 3px solid #e94560; text-align: center; display: none; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.8); min-width: 320px; max-height: 85vh; overflow-y: auto; }
        .panel h2 { margin-top: 0; color: #e94560; font-size: 28px; }
        
        .upgrade-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: #0f3460; color: white; border: 2px solid #4a4e69; border-radius: 8px; font-size: 18px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .upgrade-btn:hover { background-color: #e94560; border-color: white; transform: scale(1.02); }
        .upgrade-btn.max-level-btn { background: linear-gradient(45deg, #d90429, #ff5c77); border-color: #ffd166; animation: pulse-glow 1.5s infinite alternate; }
        
        /* 专属Buff边框 */
        .upgrade-btn.class-exclusive { border-color: #fca311; background-color: #3b2a1a; }
        
        @keyframes pulse-glow { from { box-shadow: 0 0 5px #ff5c77; } to { box-shadow: 0 0 20px #ffd166; } }

        #start-panel { display: block; }
        button.action-btn { padding: 12px 20px; font-size: 16px; background-color: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        button.action-btn:hover { background-color: #ff5c77; }

        .buff-item { display: flex; align-items: center; justify-content: space-between; background-color: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #00f5d4; }
        .buff-item.maxed { border-left-color: #d90429; background-color: rgba(217, 4, 41, 0.1); }
        .buff-item-name { font-weight: bold; font-size: 16px; }
        .buff-item-lvl { color: #ffd166; font-weight: bold; }
        .buff-item-lvl.max-text { color: #ef233c; text-shadow: 0 0 5px #ff5c77; }

        /* 职业选择UI */
        .class-selector { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .class-card { background: #0f3460; border: 2px solid #4a4e69; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; width: 80px; }
        .class-card:hover { transform: translateY(-5px); background: #1a4a80; }
        .class-card.active { border-color: #fca311; background: #2a1a3a; box-shadow: 0 0 15px #fca311; }
        .class-icon { font-size: 30px; margin-bottom: 5px; }
        .class-name { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="xp-bar-container" style="display: none;">
            <div id="xp-bar"></div>
        </div>
        <div id="level-text" style="display: none;">Lv. 1</div>
        <div id="timer-text" style="display: none;">10:00</div>
        <button id="settings-btn" onclick="openSettings()">⚙️ 设置</button>
        <button id="gm-btn" onclick="openGM()">🛠️ GM</button>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="start-panel" class="panel">
            <h2>🌿 割草特工队 🌿<br><span style="font-size:16px; color:#ffd166;">职业觉醒版</span></h2>
            
            <div style="margin-top: 15px; text-align: left; padding-left: 10px; font-weight: bold; color: #00f5d4;">选择特工职业：</div>
            <div class="class-selector">
                <div class="class-card active" id="class-warrior" onclick="selectClass('warrior')">
                    <div class="class-icon">🗡️</div><div class="class-name">战士</div>
                </div>
                <div class="class-card" id="class-mage" onclick="selectClass('mage')">
                    <div class="class-icon">🧙‍♂️</div><div class="class-name">法师</div>
                </div>
                <div class="class-card" id="class-archer" onclick="selectClass('archer')">
                    <div class="class-icon">🏹</div><div class="class-name">射手</div>
                </div>
            </div>

            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                <button class="action-btn" onclick="startGame('classic')">经典模式(10分钟)</button>
                <button class="action-btn" style="background-color: #7209b7;" onclick="startGame('hard')">困难模式💀</button>
                <button class="action-btn" style="background-color: #d00000;" onclick="startGame('rampage')">狂暴模式🩸</button>
                <button class="action-btn" style="background-color: #fca311; color: #1a1a2e;" onclick="startGame('debug')">🐛 调试</button>
            </div>
            <br>
            <button class="action-btn" style="background-color: #4a4e69; font-size: 14px;" onclick="showLeaderboard()">🏆 排行榜</button>
        </div>

        <div id="settings-panel" class="panel">
            <h2>⚙️ 游戏暂停</h2>
            <div style="text-align: left; margin-bottom: 10px; font-size: 14px; color: #aaa;">已获增益 (Buff):</div>
            <div id="current-buffs-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="action-btn" style="background-color: #00f5d4; color: #1a1a2e;" onclick="resumeGame()">▶️ 继续游戏</button>
                <button class="action-btn" style="background-color: #4a4e69;" onclick="startGame(currentMode)">🔄 重新开始</button>
                <button class="action-btn" onclick="forceEndGame()">💀 结束并保存战绩</button>
            </div>
        </div>

        <div id="gm-panel" class="panel" style="min-width: 360px; max-width: 90vw;">
            <h2>🛠️ GM 控制台</h2>
            <div style="margin-bottom: 15px;">
                <span style="color: #aaa; font-weight: bold;">一键直升：</span>
                <button class="action-btn" style="padding: 5px 10px; font-size: 14px;" onclick="gmSetLevel(10)">Lv.10</button>
                <button class="action-btn" style="padding: 5px 10px; font-size: 14px;" onclick="gmSetLevel(20)">Lv.20</button>
                <button class="action-btn" style="padding: 5px 10px; font-size: 14px;" onclick="gmSetLevel(30)">Lv.30</button>
                <button class="action-btn" style="padding: 5px 10px; font-size: 14px; background-color: #ffb703; color: #1a1a2e;" onclick="gmSetLevel(40)">Lv.40</button>
            </div>
            <div id="gm-buff-list" style="max-height: 280px; overflow-y: auto; text-align: left; margin-bottom: 15px; border: 1px solid #4a4e69; padding: 10px; border-radius: 8px;"></div>
            <button class="action-btn" style="background-color: #4a4e69; width: 100%;" onclick="closeGM()">✅ 完成配置</button>
        </div>

        <div id="leaderboard-panel" class="panel">
            <h2>🏆 英雄榜 🏆</h2>
            <table style="width: 100%; color: white; text-align: left; border-collapse: collapse; margin-top: 15px; font-size: 14px;">
                <thead><tr style="border-bottom: 2px solid #4a4e69;"><th>职业</th><th>模式</th><th>存活时间</th><th>击杀</th></tr></thead>
                <tbody id="leaderboard-list"></tbody>
            </table>
            <br><button class="action-btn" onclick="hideLeaderboard()">返回主页</button>
        </div>

        <div id="levelup-panel" class="panel">
            <h2>✨ 升级啦！选择强化 ✨</h2>
            <div id="upgrade-options"></div>
        </div>

        <div id="gameover-panel" class="panel">
            <h2 id="end-title">💀 游戏结束 💀</h2>
            <p id="final-stats">职业: 战士 <br>存活时间: 00:00 <br> 击杀数: 0</p>
            <br>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="action-btn" onclick="startGame(currentMode)">再来一局</button>
                <button class="action-btn" style="background-color: #4a4e69;" onclick="showLeaderboard()">看排行榜</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const xpBar = document.getElementById('xp-bar');
    const xpContainer = document.getElementById('xp-bar-container');
    const levelText = document.getElementById('level-text');
    const timerText = document.getElementById('timer-text');
    const startPanel = document.getElementById('start-panel');
    const levelupPanel = document.getElementById('levelup-panel');
    const gameoverPanel = document.getElementById('gameover-panel');
    const endTitle = document.getElementById('end-title');
    const leaderboardPanel = document.getElementById('leaderboard-panel');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsBtn = document.getElementById('settings-btn');
    const gmBtn = document.getElementById('gm-btn');
    const gmPanel = document.getElementById('gm-panel');
    const gmBuffList = document.getElementById('gm-buff-list');
    const upgradeOptions = document.getElementById('upgrade-options');
    const currentBuffsList = document.getElementById('current-buffs-list');
    const finalStats = document.getElementById('final-stats');
    const joystickZone = document.getElementById('joystick-zone');
    const joystickKnob = document.getElementById('joystick-knob');

    let gameState = 'start'; 
    let lastTime = 0; let gameTime = 0; let killCount = 0;
    let currentMode = 'classic'; 
    let selectedClass = 'warrior'; // 当前选择的职业

    let joyActive = false; let joyDx = 0, joyDy = 0;

    // --- 输入控制 ---
    function resetInput() {
        joyActive = false; joyDx = 0; joyDy = 0;
        joystickKnob.style.transform = `translate(-50%, -50%)`;
        for (let k in keys) keys[k] = false;
    }
    window.addEventListener('blur', resetInput);

    function formatTime(totalSeconds) {
        const m = Math.floor(Math.max(0, totalSeconds) / 60).toString().padStart(2, '0');
        const s = Math.floor(Math.max(0, totalSeconds) % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    function handleJoystickStart(e) { e.preventDefault(); joyActive = true; updateJoystick(e.touches ? e.touches[0] : e); }
    function handleJoystickMove(e) { e.preventDefault(); if(joyActive) updateJoystick(e.touches ? e.touches[0] : e); }
    function handleJoystickEnd(e) { if (e && e.type && e.type.startsWith('touch')) e.preventDefault(); resetInput(); }
    function updateJoystick(touch) {
        const rect = joystickZone.getBoundingClientRect(); const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX, dy = touch.clientY - centerY;
        const dist = Math.hypot(dx, dy), maxDist = rect.width / 2;
        if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        if (Math.min(dist, maxDist) > 0) { joyDx = dx / maxDist; joyDy = dy / maxDist; } else { joyDx = 0; joyDy = 0; }
    }
    joystickZone.addEventListener('touchstart', handleJoystickStart, {passive: false}); joystickZone.addEventListener('touchmove', handleJoystickMove, {passive: false});
    joystickZone.addEventListener('touchend', handleJoystickEnd, {passive: false}); joystickZone.addEventListener('touchcancel', handleJoystickEnd, {passive: false});
    joystickZone.addEventListener('mousedown', handleJoystickStart); window.addEventListener('mousemove', handleJoystickMove); window.addEventListener('mouseup', handleJoystickEnd);

    // 职业选择逻辑
    function selectClass(c) {
        selectedClass = c;
        document.getElementById('class-warrior').className = 'class-card';
        document.getElementById('class-mage').className = 'class-card';
        document.getElementById('class-archer').className = 'class-card';
        document.getElementById(`class-${c}`).className = 'class-card active';
    }

    // 🎧 音效系统
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const soundManager = {
        bgmInterval: null,
        playTone: function(freqStart, freqEnd, type, duration, vol=0.05) {
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
                if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        },
        playShoot: () => soundManager.playTone(600, 200, 'sine', 0.08, 0.015),
        playHit: () => soundManager.playTone(200, 50, 'triangle', 0.05, 0.02),
        playExp: () => soundManager.playTone(1200, 1600, 'sine', 0.06, 0.015),
        playCrit: () => soundManager.playTone(1000, 200, 'square', 0.08, 0.015), 
        playVictory: () => {
            soundManager.playTone(523, null, 'sine', 0.3, 0.1); 
            setTimeout(() => soundManager.playTone(659, null, 'sine', 0.3, 0.1), 150); 
            setTimeout(() => soundManager.playTone(783, null, 'sine', 0.3, 0.1), 300); 
            setTimeout(() => soundManager.playTone(1046, null, 'sine', 0.8, 0.1), 450); 
        },
        playLevelUp: () => {
            soundManager.playTone(440, null, 'sine', 0.2, 0.05); setTimeout(() => soundManager.playTone(554, null, 'sine', 0.2, 0.05), 100); 
            setTimeout(() => soundManager.playTone(659, null, 'sine', 0.2, 0.05), 200); setTimeout(() => soundManager.playTone(880, null, 'sine', 0.4, 0.05), 300); 
        },
        playAwaken: () => { 
            soundManager.playTone(440, null, 'sine', 1.0, 0.05); soundManager.playTone(554, null, 'sine', 1.0, 0.05);
            setTimeout(() => soundManager.playTone(880, null, 'sine', 1.5, 0.06), 150);
        },
        startBGM: function() {
            if(this.bgmInterval) return;
            const notes = [130.81, 155.56, 130.81, 103.83]; let i = 0;
            this.bgmInterval = setInterval(() => {
                if(gameState === 'playing') { this.playTone(notes[i], null, 'triangle', 0.4, 0.02); i = (i + 1) % notes.length; }
            }, 600);
        },
        stopBGM: function() { if(this.bgmInterval) { clearInterval(this.bgmInterval); this.bgmInterval = null; } }
    };

    // --- 视觉特效类 ---
    class Effect {
        constructor(x1, y1, x2, y2, isAwakened = false) {
            this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
            this.life = isAwakened ? 0.4 : 0.2; this.isAwakened = isAwakened;
        }
        update(dt) { this.life -= dt; }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.x1, this.y1);
            const midX = (this.x1 + this.x2) / 2 + (Math.random() * 40 - 20); const midY = (this.y1 + this.y2) / 2 + (Math.random() * 40 - 20);
            ctx.lineTo(midX, midY); ctx.lineTo(this.x2, this.y2);
            if(this.isAwakened) {
                ctx.strokeStyle = `rgba(217, 4, 41, ${this.life * 3})`; ctx.lineWidth = 8; ctx.stroke();
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 5})`; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x2, this.y2, 30, 0, Math.PI * 2); ctx.fillStyle = `rgba(217, 4, 41, ${this.life * 1.5})`; ctx.fill();
            } else {
                ctx.strokeStyle = `rgba(0, 245, 212, ${this.life * 5})`; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x2, this.y2, 15, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 245, 212, ${this.life * 2})`; ctx.fill();
            }
        }
    }

    class LaserLine {
        constructor(pts, isAwakened) { this.pts = pts; this.life = isAwakened ? 0.4 : 0.2; this.isAwakened = isAwakened; }
        update(dt) { this.life -= dt; }
        draw() {
            if(this.pts.length < 2) return;
            ctx.beginPath(); ctx.moveTo(this.pts[0].x, this.pts[0].y); for(let i=1; i<this.pts.length; i++) ctx.lineTo(this.pts[i].x, this.pts[i].y);
            if (this.isAwakened) { ctx.strokeStyle = `rgba(217, 4, 41, ${this.life * 3})`; ctx.lineWidth = 10; ctx.stroke(); ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 5})`; ctx.lineWidth = 4; ctx.stroke();
            } else { ctx.strokeStyle = `rgba(67, 97, 238, ${this.life * 4})`; ctx.lineWidth = 6; ctx.stroke(); ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 5})`; ctx.lineWidth = 2; ctx.stroke(); }
        }
    }

    class DamageZone {
        constructor(x, y, radius, damage, type = 'fire') {
            this.x = x; this.y = y; this.radius = radius; this.type = type;
            this.lifeTime = (type === 'blueFire' || type === 'nuke' || type === 'plague') ? 4.0 : 2.0; 
            this.damage = damage; this.tickTimer = 0;
        }
        update(dt) {
            this.lifeTime -= dt; this.tickTimer -= dt;
            if(this.tickTimer <= 0) {
                this.tickTimer = 0.2; 
                for(let e of enemies) {
                    if(Math.hypot(e.x - this.x, e.y - this.y) < this.radius + e.radius) { 
                        e.takeDamage(this.damage * 0.2, false); 
                        if(this.type === 'plague') e.isPlagued = true; 
                    }
                }
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); const alphaTime = Math.max(0, this.lifeTime);
            if (this.type === 'blueFire') { ctx.fillStyle = `rgba(67, 97, 238, ${alphaTime * 0.3})`; ctx.fill(); ctx.strokeStyle = `rgba(76, 201, 240, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            } else if (this.type === 'plague') { ctx.fillStyle = `rgba(114, 9, 183, ${alphaTime * 0.4})`; ctx.fill(); ctx.strokeStyle = `rgba(181, 23, 158, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            } else if (this.type === 'nuke') { ctx.fillStyle = `rgba(57, 255, 20, ${alphaTime * 0.1})`; ctx.strokeStyle = `rgba(0, 255, 0, ${alphaTime * 0.4})`; ctx.lineWidth = 2; ctx.stroke();
            } else if (this.type === 'lightning') { ctx.fillStyle = `rgba(255, 92, 119, ${alphaTime * 0.3})`; ctx.fill(); ctx.strokeStyle = `rgba(217, 4, 41, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            } else { ctx.fillStyle = `rgba(255, 153, 0, ${alphaTime * 0.3})`; ctx.fill(); ctx.strokeStyle = `rgba(255, 60, 0, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke(); }
        }
    }

    class Explosion {
        constructor(x, y, radius, isAwakened, type = 'normal') {
            this.x = x; this.y = y; this.maxRadius = radius; this.radius = 0.1; this.life = 0.3; this.isAwakened = isAwakened; this.type = type;
        }
        update(dt) { this.life -= dt; this.radius += (this.maxRadius - this.radius) * 10 * dt; if(this.radius < 0.1) this.radius = 0.1; }
        draw() {
            if(this.radius <= 0) return;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            if (this.type === 'nuke') ctx.fillStyle = `rgba(57, 255, 20, ${this.life * 3})`;
            else if (this.type === 'ice') ctx.fillStyle = `rgba(0, 191, 255, ${this.life * 3})`;
            else if (this.type === 'poison') ctx.fillStyle = `rgba(181, 23, 158, ${this.life * 3})`;
            else if (this.type === 'bloom') ctx.fillStyle = `rgba(114, 9, 183, ${this.life * 3})`; // 死亡爆破颜色
            else ctx.fillStyle = `rgba(255, 92, 119, ${this.life * 3})`;

        }

    // --- 新增致敬元气骑士的特效类 ---

        update(dt) {
            this.life -= dt;
            if(this.life <= 0) { this.markedForDeletion = true; return; }

            ctx.moveTo(-this.radius, 0); ctx.lineTo(this.radius, 0);

    class Turret {

        update(dt) {

                let target = null; let minDist = Infinity;

                if (target) {
                    const angle = Math.atan2(target.y-this.y, target.x-this.x);
                    bullets.push(new Bullet(this.x, this.y, angle, 600, this.damage, 1, this.isAwakened));
                    soundManager.playShoot();
                }
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            ctx.fillStyle = '#4a4e69'; ctx.fillRect(-10, -10, 20, 20);

            ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = `rgba(255,255,255,${this.life/5})`; ctx.strokeRect(-12, -12, 24, 24);

    class Shuriken {
        constructor(x, y, angle, speed, damage, isAwakened) {
            this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;

            this.lifeTime = 3; this.markedForDeletion = false; this.angle = 0;
        }
        update(dt) {
            this.x += this.vx * dt; this.y += this.vy * dt; this.lifeTime -= dt;
            this.angle += 15 * dt;

            ctx.fillStyle = this.isAwakened ? '#fca311' : '#adb5bd';

                ctx.lineTo(0, -this.radius); ctx.lineTo(3, -3);
                ctx.rotate(Math.PI/2);

    class Slash {
        constructor(x, y, angle, radius, damage, isAwakened) {
            this.x = x; this.y = y; this.angle = angle; this.radius = isAwakened ? radius * 1.5 : radius;
            this.damage = damage; this.isAwakened = isAwakened;
            this.life = 0.25; this.maxLife = 0.25; this.hitEnemies = new Set();
        }
        update(dt) {
            this.life -= dt;
            if (this.life <= 0) { this.markedForDeletion = true; return; }
            const cx = player.x + Math.cos(this.angle) * 20;
            const cy = player.y + Math.sin(this.angle) * 20;
            this.x = cx; this.y = cy; 

            const dmgInfo = player.calcDamage(this.damage);
            for (let e of enemies) {
                if (this.hitEnemies.has(e)) continue;
                if (Math.hypot(e.x - cx, e.y - cy) < this.radius + e.radius) {
                    e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit);
                    this.hitEnemies.add(e);
                }
            }
        }
        draw() {
            if (this.life <= 0) return;
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            const progress = 1 - (this.life / this.maxLife);
            ctx.rotate(-Math.PI/2 + Math.PI * progress);
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, -Math.PI/3, Math.PI/3);
            ctx.strokeStyle = this.isAwakened ? `rgba(181, 23, 158, ${this.life * 4})` : `rgba(239, 35, 60, ${this.life * 4})`;
            ctx.lineWidth = this.isAwakened ? 40 : 20;
            ctx.stroke();
            ctx.restore();
        }
    }

    // 战士专属：震荡波实体
    class Shockwave {
        constructor(x, y, maxRadius, damage) {
            this.x = x; this.y = y; this.maxRadius = maxRadius; this.radius = 10; this.damage = damage;
            this.life = 0.4; this.markedForDeletion = false; this.hitEnemies = new Set();
        }
        update(dt) {
            this.life -= dt; this.radius += (this.maxRadius - this.radius) * 8 * dt;
            if (this.life <= 0) { this.markedForDeletion = true; return; }
            const dmgInfo = player.calcDamage(this.damage);
            for(let e of enemies) {
                if (this.hitEnemies.has(e)) continue;
                if (Math.hypot(e.x - this.x, e.y - this.y) < this.radius + e.radius) {
                    e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); this.hitEnemies.add(e);
                    // 击退
                    const angle = Math.atan2(e.y - this.y, e.x - this.x); e.x += Math.cos(angle)*30; e.y += Math.sin(angle)*30;
                }
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 2.5})`; ctx.lineWidth = 10; ctx.stroke();
        }
    }

    // 法师专属：坠落的陨石
    class Meteor {
        constructor(tx, ty, damage, blastRadius, isAwakened) {
            this.tx = tx; this.ty = ty; this.x = tx + (Math.random()*200 - 100); this.y = ty - 800; // 从天上掉下来
            this.damage = damage; this.blastRadius = isAwakened ? blastRadius * 2 : blastRadius; this.isAwakened = isAwakened;
            this.speed = 1200; this.markedForDeletion = false;
        }
        update(dt) {
            const angle = Math.atan2(this.ty - this.y, this.tx - this.x);
            this.x += Math.cos(angle) * this.speed * dt; this.y += Math.sin(angle) * this.speed * dt;
            if (this.y >= this.ty) {
                this.markedForDeletion = true; soundManager.playShoot();
                const dmgInfo = player.calcDamage(this.damage);
                for (let e of enemies) { if (Math.hypot(e.x - this.tx, e.y - this.ty) < this.blastRadius + e.radius) { e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); } }
                effects.push(new Explosion(this.tx, this.ty, this.blastRadius, this.isAwakened));
                if(this.isAwakened) damageZones.push(new DamageZone(this.tx, this.ty, this.blastRadius, this.damage * 0.5, 'fire'));
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.isAwakened ? 30 : 20, 0, Math.PI*2);
            ctx.fillStyle = this.isAwakened ? '#d90429' : '#ffb703'; ctx.fill();
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff5c77';
        }
    }

    // 射手专属：穿云重箭
    class Arrow {
        constructor(x, y, angle, speed, damage, isAwakened) {
            this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.damage = damage; this.isAwakened = isAwakened; this.lifeTime = 3; this.markedForDeletion = false;
            this.hitEnemies = new Set();

        draw() {

            ctx.restore();
        }
    }

    // --- 其他武器实体 ---
    class Missile {
        constructor(x, y, damage, blastRadius, isAwakened = false) {
            this.x = x; this.y = y; this.damage = damage; this.blastRadius = isAwakened ? blastRadius * 2.5 : blastRadius;
            this.isAwakened = isAwakened; this.speed = 300;
            const initAngle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(initAngle) * this.speed; this.vy = Math.sin(initAngle) * this.speed;
            this.lifeTime = 4; this.target = null; this.markedForDeletion = false;
        }
        update(dt) {
            this.lifeTime -= dt; if (this.lifeTime <= 0) { this.explode(); return; }
            if (!this.target || this.target.markedForDeletion) {
                let minDist = Infinity;
                for (let e of enemies) { const dist = Math.hypot(e.x - this.x, e.y - this.y); if (dist < minDist) { minDist = dist; this.target = e; } }
            }
            if (this.target) {
                const desiredAngle = Math.atan2(this.target.y - this.y, this.target.x - this.x); const currentAngle = Math.atan2(this.vy, this.vx);
                let angleDiff = desiredAngle - currentAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2; while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const newAngle = currentAngle + angleDiff * 3.0 * dt;
                this.speed += 200 * dt; this.vx = Math.cos(newAngle) * this.speed; this.vy = Math.sin(newAngle) * this.speed;
            }
            this.x += this.vx * dt; this.y += this.vy * dt;
            for (let e of enemies) { if (Math.hypot(e.x - this.x, e.y - this.y) < e.radius + 10) { this.explode(); break; } }
        }
        explode() {
            this.markedForDeletion = true; soundManager.playShoot();
            const dmgInfo = player.calcDamage(this.damage);
            for (let e of enemies) { if (Math.hypot(e.x - this.x, e.y - this.y) < this.blastRadius + e.radius) { e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); } }
            if (this.isAwakened) damageZones.push(new DamageZone(this.x, this.y, this.blastRadius, this.damage * 0.5, 'nuke'));
            effects.push(new Explosion(this.x, this.y, this.blastRadius, this.isAwakened, this.isAwakened ? 'nuke' : 'normal'));
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(this.vy, this.vx));
            if (this.isAwakened) {
                ctx.fillStyle = '#2b2d42'; ctx.fillRect(-15, -6, 30, 12); ctx.fillStyle = '#55a630'; ctx.beginPath(); ctx.arc(15, 0, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff5c77'; ctx.beginPath(); ctx.arc(-18, 0, 4 + Math.random()*3, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = '#fff'; ctx.fillRect(-10, -4, 20, 8); ctx.fillStyle = '#d90429'; ctx.beginPath(); ctx.arc(10, 0, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffb703'; ctx.beginPath(); ctx.arc(-12, 0, 3 + Math.random()*2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
    }

    class Axe {
        constructor(x, y, vx, vy, damage, isAwakened) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.damage = damage; this.isAwakened = isAwakened;
            this.radius = isAwakened ? 25 : 15; this.lifeTime = 3; this.hitEnemies = new Set();
            this.markedForDeletion = false; this.angle = 0;
        }
        update(dt) {
            this.vy += 1200 * dt; this.x += this.vx * dt; this.y += this.vy * dt; this.angle += 15 * dt;
            this.lifeTime -= dt; if(this.lifeTime<=0) this.markedForDeletion = true;
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            if(this.isAwakened) {
                ctx.fillStyle = '#d90429'; ctx.fillRect(-4, -25, 8, 50); ctx.fillStyle = '#ffb703';
                ctx.beginPath(); ctx.arc(10, 0, 15, -Math.PI/2, Math.PI/2); ctx.fill(); ctx.beginPath(); ctx.arc(-10, 0, 15, Math.PI/2, Math.PI*1.5); ctx.fill();
            } else {
                ctx.fillStyle = '#8d99ae'; ctx.fillRect(-3, -15, 6, 30); ctx.fillStyle = '#edf2f4';
                ctx.beginPath(); ctx.arc(8, 0, 10, -Math.PI/2, Math.PI/2); ctx.fill();
            }
            ctx.restore();
        }
    }

    class BlackHole {
        constructor(x, y, radius, damage, isAwakened) {
            this.x = x; this.y = y; this.radius = radius; this.pullRadius = isAwakened ? radius * 4 : radius * 3; 
            this.damage = damage; this.isAwakened = isAwakened; this.lifeTime = isAwakened ? 5.0 : 3.0; this.tickTimer = 0; this.markedForDeletion = false;
        }
        update(dt) {
            this.lifeTime -= dt;
            if (this.lifeTime <= 0) { 
                if(this.isAwakened) {
                    const dmgInfo = player.calcDamage(this.damage * 5);
                    for(let e of enemies) { if(Math.hypot(e.x - this.x, e.y - this.y) < this.pullRadius) e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); }
                    effects.push(new Explosion(this.x, this.y, this.pullRadius, true, 'normal')); soundManager.playAwaken();
                }
                this.markedForDeletion = true; return; 
            }
            this.tickTimer -= dt; const pullForce = this.isAwakened ? 300 : 150;
            for(let e of enemies) {
                const dist = Math.hypot(e.x - this.x, e.y - this.y);
                if (dist < this.pullRadius) { const angle = Math.atan2(this.y - e.y, this.x - e.x); e.x += Math.cos(angle) * pullForce * dt; e.y += Math.sin(angle) * pullForce * dt; }
                if (dist < this.radius && this.tickTimer <= 0) { const dmgInfo = player.calcDamage(this.damage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); }
            }
            if(this.tickTimer <= 0) this.tickTimer = 0.5; 
        }
        draw() {
            if(this.radius <= 0) return;
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(gameTime * (this.isAwakened ? -5 : 3)); 
            ctx.beginPath(); ctx.arc(0, 0, this.radius * 0.5, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();
            ctx.beginPath(); ctx.ellipse(0, 0, this.radius, this.radius * 0.4, 0, 0, Math.PI*2);
            ctx.strokeStyle = this.isAwakened ? '#7209b7' : '#4cc9f0'; ctx.lineWidth = this.isAwakened ? 6 : 3;
            ctx.shadowBlur = 20; ctx.shadowColor = this.isAwakened ? '#f72585' : '#4cc9f0'; ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, this.pullRadius, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(114, 9, 183, ${Math.max(0, this.lifeTime)*0.1})`; ctx.lineWidth = 1; ctx.stroke();
            ctx.restore();
        }
    }

    class Boomerang {
        constructor(x, y, angle, speed, damage, radius, isAwakened = false) {
            this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.baseSpeed = speed; this.damage = damage; this.radius = isAwakened ? radius * 2.5 : radius;
            this.isAwakened = isAwakened; this.lifeTime = 3; this.state = 'outward'; this.hitEnemies = new Set();
            this.markedForDeletion = false;
        }
        update(dt) {
            this.lifeTime -= dt; if (this.lifeTime <= 0) { this.markedForDeletion = true; return; }
            if (this.state === 'outward') {
                this.x += this.vx * dt; this.y += this.vy * dt; this.vx *= 0.95; this.vy *= 0.95; 
                if (Math.hypot(this.vx, this.vy) < 80) { this.state = 'returning'; this.hitEnemies.clear(); }
            } else {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.vx += Math.cos(angle) * 1500 * dt; this.vy += Math.sin(angle) * 1500 * dt;
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > this.baseSpeed * 2) { this.vx = (this.vx / speed) * this.baseSpeed * 2; this.vy = (this.vy / speed) * this.baseSpeed * 2; }
                this.x += this.vx * dt; this.y += this.vy * dt;
                if (Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) { this.markedForDeletion = true; }
            }
        }
        draw() {
            if(this.radius <= 0) return;
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(gameTime * 20); ctx.beginPath();
            if (this.isAwakened) {
                ctx.arc(0, 0, this.radius, 0, Math.PI * 1.5, false); ctx.lineTo(0, 0); ctx.fillStyle = '#d90429'; ctx.fill(); ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 3; ctx.stroke();
            } else {
                ctx.moveTo(-this.radius, -this.radius/2); ctx.lineTo(this.radius, 0); ctx.lineTo(-this.radius, this.radius/2); ctx.lineTo(-this.radius/2, 0);
                ctx.fillStyle = '#4cc9f0'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, angle, speed, baseDamage, pierce, isPlasma = false) {
            this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.radius = isPlasma ? 18 : 6; this.baseDamage = baseDamage; this.pierce = pierce; this.isPlasma = isPlasma; 
            this.hitEnemies = new Set(); this.lifeTime = 2; this.markedForDeletion = false;
        }
        update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.lifeTime -= dt; if (this.lifeTime <= 0) this.markedForDeletion = true; }
        draw() {
            if(this.radius <= 0) return;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            if (this.isPlasma) {
                ctx.fillStyle = '#4cc9f0'; ctx.shadowBlur = 20; ctx.shadowColor = '#4361ee'; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.shadowBlur = 0;
            } else { ctx.fillStyle = '#fee440'; ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = '#fee440'; ctx.shadowBlur = 0; }
        }
    }

    class Chest {
        constructor(x, y) { this.x = x; this.y = y; this.radius = 15; this.markedForDeletion = false; this.pulseTime = 0; }
        update(dt) {
            this.pulseTime += dt * 5; const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < player.pickupRange) {
                const angle = Math.atan2(player.y - this.y, player.x - this.x); this.x += Math.cos(angle) * 300 * dt; this.y += Math.sin(angle) * 300 * dt;
                if (dist < player.radius + this.radius) { this.markedForDeletion = true; soundManager.playLevelUp(); triggerLevelUp(); }
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); const scale = 1 + Math.sin(this.pulseTime) * 0.1; ctx.scale(scale, scale);
            ctx.fillStyle = '#ffb703'; ctx.fillRect(-10, -8, 20, 16); ctx.strokeStyle = '#fb8500'; ctx.lineWidth = 2; ctx.strokeRect(-10, -8, 20, 16);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 15; ctx.shadowColor = '#ffd166'; ctx.strokeStyle = `rgba(255, 209, 102, ${0.5 + Math.sin(this.pulseTime)*0.5})`;
            ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.stroke(); ctx.restore();
        }
    }

    class Gem {
        constructor(x, y, value) {
            this.x = x + (Math.random() * 20 - 10); this.y = y + (Math.random() * 20 - 10);
            this.value = value; this.radius = value > 20 ? 8 : 5; this.color = value > 20 ? '#06d6a0' : '#80ed99';
            this.markedForDeletion = false; this.isMagnetic = false; 
        }
        update(dt) {
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < player.pickupRange || this.isMagnetic) {
                this.isMagnetic = true; const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 500 * dt; this.y += Math.sin(angle) * 500 * dt;
                if (dist < player.radius + this.radius) { soundManager.playExp(); player.gainXp(this.value); this.markedForDeletion = true; }
            }
        }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y);
            ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
            ctx.closePath(); ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
        }
    }

    class FloatingText {
        constructor(x, y, text, color, isCrit = false) {
            this.x = x + (Math.random() * 20 - 10); this.y = y - 10; this.text = text; this.color = color; 
            this.isCrit = isCrit; this.life = isCrit ? 1.2 : 0.8; this.vy = isCrit ? -40 : -30;
        }
        update(dt) { this.y += this.vy * dt; this.life -= dt; }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life / (this.isCrit ? 1.2 : 0.8));
