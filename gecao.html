<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>割草特工队 - 终极觉醒版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #xp-bar-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #4a4e69;
            border-radius: 10px;
            overflow: hidden;
        }
        #xp-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, #0077b6);
            transition: width 0.2s;
        }
        #level-text {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #timer-text {
            position: absolute;
            top: 40px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #settings-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background-color: #4a4e69;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 18px;
            cursor: pointer;
            pointer-events: auto;
            display: none;
        }
        #settings-btn:hover { background-color: #e94560; }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            display: none;
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(22, 33, 62, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #e94560;
            text-align: center;
            display: none;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            min-width: 320px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .panel h2 { margin-top: 0; color: #e94560; font-size: 28px; }
        .upgrade-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #0f3460;
            color: white;
            border: 2px solid #4a4e69;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .upgrade-btn:hover { background-color: #e94560; border-color: white; transform: scale(1.02); }
        .upgrade-btn.max-level-btn {
            background: linear-gradient(45deg, #d90429, #ff5c77);
            border-color: #ffd166;
            animation: pulse-glow 1.5s infinite alternate;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px #ff5c77; }
            to { box-shadow: 0 0 20px #ffd166; }
        }

        #start-panel { display: block; }
        button.action-btn {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button.action-btn:hover { background-color: #ff5c77; }

        .buff-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 8px;
            border-left: 4px solid #00f5d4;
        }
        .buff-item.maxed { border-left-color: #d90429; background-color: rgba(217, 4, 41, 0.1); }
        .buff-item-name { font-weight: bold; font-size: 16px; }
        .buff-item-lvl { color: #ffd166; font-weight: bold; }
        .buff-item-lvl.max-text { color: #ef233c; text-shadow: 0 0 5px #ff5c77; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="xp-bar-container" style="display: none;">
            <div id="xp-bar"></div>
        </div>
        <div id="level-text" style="display: none;">Lv. 1</div>
        <div id="timer-text" style="display: none;">00:00</div>
        
        <button id="settings-btn" onclick="openSettings()">⚙️ 设置</button>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="start-panel" class="panel">
            <h2>🌿 割草特工队 🌿<br><span style="font-size:16px; color:#ffd166;">觉醒降临版</span></h2>
            <p>屏幕左下角 <strong>虚拟摇杆</strong> 拖动<br>或 键盘 W A S D 移动</p>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button class="action-btn" onclick="startGame('classic')">经典模式</button>
                <button class="action-btn" style="background-color: #d00000;" onclick="startGame('rampage')">狂暴模式 🩸</button>
            </div>
            <br>
            <button class="action-btn" style="background-color: #4a4e69; font-size: 16px;" onclick="showLeaderboard()">🏆 排行榜</button>
        </div>

        <div id="settings-panel" class="panel">
            <h2>⚙️ 游戏暂停</h2>
            <div style="text-align: left; margin-bottom: 10px; font-size: 14px; color: #aaa;">已获增益 (Buff):</div>
            <div id="current-buffs-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="action-btn" style="background-color: #00f5d4; color: #1a1a2e;" onclick="resumeGame()">▶️ 继续游戏</button>
                <button class="action-btn" style="background-color: #4a4e69;" onclick="startGame(currentMode)">🔄 重新开始</button>
                <button class="action-btn" onclick="forceEndGame()">💀 结束并保存战绩</button>
            </div>
        </div>

        <div id="leaderboard-panel" class="panel">
            <h2>🏆 英雄榜 🏆</h2>
            <table style="width: 100%; color: white; text-align: left; border-collapse: collapse; margin-top: 15px;">
                <thead><tr style="border-bottom: 2px solid #4a4e69;"><th>排名</th><th>模式</th><th>存活时间</th><th>击杀</th></tr></thead>
                <tbody id="leaderboard-list"></tbody>
            </table>
            <br><button class="action-btn" onclick="hideLeaderboard()">返回主页</button>
        </div>

        <div id="levelup-panel" class="panel">
            <h2>✨ 升级啦！选择强化 ✨</h2>
            <div id="upgrade-options"></div>
        </div>

        <div id="gameover-panel" class="panel">
            <h2>💀 游戏结束 💀</h2>
            <p id="final-stats">存活时间: 00:00 <br> 击杀数: 0</p>
            <br>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="action-btn" onclick="startGame(currentMode)">再来一局</button>
                <button class="action-btn" style="background-color: #4a4e69;" onclick="showLeaderboard()">看排行榜</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const xpBar = document.getElementById('xp-bar');
    const xpContainer = document.getElementById('xp-bar-container');
    const levelText = document.getElementById('level-text');
    const timerText = document.getElementById('timer-text');
    const startPanel = document.getElementById('start-panel');
    const levelupPanel = document.getElementById('levelup-panel');
    const gameoverPanel = document.getElementById('gameover-panel');
    const leaderboardPanel = document.getElementById('leaderboard-panel');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsBtn = document.getElementById('settings-btn');
    const upgradeOptions = document.getElementById('upgrade-options');
    const currentBuffsList = document.getElementById('current-buffs-list');
    const finalStats = document.getElementById('final-stats');

    const joystickZone = document.getElementById('joystick-zone');
    const joystickKnob = document.getElementById('joystick-knob');

    let gameState = 'start'; 
    let lastTime = 0;
    let gameTime = 0; 
    let killCount = 0;
    let currentMode = 'classic';

    let joyActive = false;
    let joyDx = 0, joyDy = 0;

    function resetInput() {
        joyActive = false; joyDx = 0; joyDy = 0;
        joystickKnob.style.transform = `translate(-50%, -50%)`;
        for (let k in keys) keys[k] = false;
    }
    window.addEventListener('blur', resetInput);

    function formatTime(totalSeconds) {
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    function handleJoystickStart(e) { e.preventDefault(); joyActive = true; updateJoystick(e.touches ? e.touches[0] : e); }
    function handleJoystickMove(e) { e.preventDefault(); if(joyActive) updateJoystick(e.touches ? e.touches[0] : e); }
    function handleJoystickEnd(e) { if (e && e.type && e.type.startsWith('touch')) e.preventDefault(); resetInput(); }
    function updateJoystick(touch) {
        const rect = joystickZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX, dy = touch.clientY - centerY;
        const dist = Math.hypot(dx, dy), maxDist = rect.width / 2;
        if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        if (Math.min(dist, maxDist) > 0) { joyDx = dx / maxDist; joyDy = dy / maxDist; } 
        else { joyDx = 0; joyDy = 0; }
    }
    joystickZone.addEventListener('touchstart', handleJoystickStart, {passive: false});
    joystickZone.addEventListener('touchmove', handleJoystickMove, {passive: false});
    joystickZone.addEventListener('touchend', handleJoystickEnd, {passive: false});
    joystickZone.addEventListener('touchcancel', handleJoystickEnd, {passive: false});
    joystickZone.addEventListener('mousedown', handleJoystickStart);
    window.addEventListener('mousemove', handleJoystickMove);
    window.addEventListener('mouseup', handleJoystickEnd);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const soundManager = {
        bgmInterval: null,
        playTone: function(freq, type, duration, vol=0.1) {
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        },
        playShoot: () => soundManager.playTone(600, 'square', 0.1, 0.02),
        playHit: () => soundManager.playTone(150, 'sawtooth', 0.1, 0.02),
        playExp: () => soundManager.playTone(1200, 'sine', 0.05, 0.01),
        playLevelUp: () => {
            soundManager.playTone(400, 'square', 0.1, 0.1);
            setTimeout(() => soundManager.playTone(600, 'square', 0.2, 0.1), 100);
            setTimeout(() => soundManager.playTone(800, 'square', 0.4, 0.1), 200);
        },
        playAwaken: () => { 
            soundManager.playTone(800, 'sine', 0.8, 0.2);
            setTimeout(() => soundManager.playTone(1200, 'sine', 1.0, 0.2), 200);
        },
        startBGM: function() {
            if(this.bgmInterval) return;
            const notes = [220, 220, 330, 220, 440, 330, 220, 165]; let i = 0;
            this.bgmInterval = setInterval(() => {
                if(gameState === 'playing') { this.playTone(notes[i], 'triangle', 0.2, 0.03); i = (i + 1) % notes.length; }
            }, 300);
        },
        stopBGM: function() { if(this.bgmInterval) { clearInterval(this.bgmInterval); this.bgmInterval = null; } }
    };

    // ⚡ 屏幕落雷特效 (普通 & 天劫觉醒)
    class Effect {
        constructor(x1, y1, x2, y2, isAwakened = false) {
            this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
            this.life = isAwakened ? 0.4 : 0.2; 
            this.isAwakened = isAwakened;
        }
        update(dt) { this.life -= dt; }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.x1, this.y1);
            const midX = (this.x1 + this.x2) / 2 + (Math.random() * 40 - 20);
            const midY = (this.y1 + this.y2) / 2 + (Math.random() * 40 - 20);
            ctx.lineTo(midX, midY); ctx.lineTo(this.x2, this.y2);
            
            if(this.isAwakened) {
                ctx.strokeStyle = `rgba(217, 4, 41, ${this.life * 3})`; ctx.lineWidth = 8; ctx.stroke();
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 5})`; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x2, this.y2, 30, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(217, 4, 41, ${this.life * 1.5})`; ctx.fill();
            } else {
                ctx.strokeStyle = `rgba(0, 245, 212, ${this.life * 5})`; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x2, this.y2, 15, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 245, 212, ${this.life * 2})`; ctx.fill();
            }
        }
    }

    // 🌪️ 燃烧瓶/天劫的地板伤害区域
    class DamageZone {
        constructor(x, y, radius, damage, type = 'fire') {
            this.x = x; this.y = y; this.radius = radius;
            this.type = type;
            this.lifeTime = (type === 'blueFire') ? 4.0 : 2.0; 
            this.damage = damage;
            this.tickTimer = 0;
        }
        update(dt) {
            this.lifeTime -= dt; this.tickTimer -= dt;
            if(this.tickTimer <= 0) {
                this.tickTimer = 0.2; // 每0.2秒烧一次
                for(let e of enemies) {
                    if(Math.hypot(e.x - this.x, e.y - this.y) < this.radius + e.radius) {
                        e.takeDamage(this.damage * 0.2); 
                    }
                }
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            const alphaTime = Math.max(0, this.lifeTime);
            if (this.type === 'blueFire') {
                // 幽冥地火：蓝冰色
                ctx.fillStyle = `rgba(67, 97, 238, ${alphaTime * 0.3})`; ctx.fill();
                ctx.strokeStyle = `rgba(76, 201, 240, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            } else if (this.type === 'lightning') {
                // 天劫神雷残炎：猩红色
                ctx.fillStyle = `rgba(255, 92, 119, ${alphaTime * 0.3})`; ctx.fill();
                ctx.strokeStyle = `rgba(217, 4, 41, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            } else { 
                // 普通燃烧瓶：橘红色
                ctx.fillStyle = `rgba(255, 153, 0, ${alphaTime * 0.3})`; ctx.fill();
                ctx.strokeStyle = `rgba(255, 60, 0, ${alphaTime})`; ctx.lineWidth = 2; ctx.stroke();
            }
        }
    }

    // 🪃 回旋镖实体类
    class Boomerang {
        constructor(x, y, angle, speed, damage, radius, isAwakened = false) {
            this.x = x; this.y = y;
            this.vx = Math.cos(angle) * speed; 
            this.vy = Math.sin(angle) * speed;
            this.baseSpeed = speed;
            this.damage = damage;
            this.radius = isAwakened ? radius * 2.5 : radius;
            this.isAwakened = isAwakened;
            this.lifeTime = 3; // 存活最大3秒
            this.state = 'outward'; // outward: 飞出, returning: 返回
            this.hitEnemies = new Set();
            this.markedForDeletion = false;
        }
        update(dt) {
            this.lifeTime -= dt;
            if (this.lifeTime <= 0) { this.markedForDeletion = true; return; }

            if (this.state === 'outward') {
                this.x += this.vx * dt; this.y += this.vy * dt;
                // 模拟空气阻力减速
                this.vx *= 0.95; this.vy *= 0.95; 
                // 速度降下来后开始返回
                if (Math.hypot(this.vx, this.vy) < 80) { 
                    this.state = 'returning';
                    this.hitEnemies.clear(); // 清空受击列表，返回时可造成二段伤害
                }
            } else {
                // 朝着玩家强力飞回
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.vx += Math.cos(angle) * 1500 * dt; 
                this.vy += Math.sin(angle) * 1500 * dt;
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > this.baseSpeed * 2) { // 最高限速
                    this.vx = (this.vx / speed) * this.baseSpeed * 2;
                    this.vy = (this.vy / speed) * this.baseSpeed * 2;
                }
                this.x += this.vx * dt; this.y += this.vy * dt;

                // 回到玩家身边接住消失
                if (Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) {
                    this.markedForDeletion = true;
                }
            }
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(gameTime * 20); // 极速自转
            ctx.beginPath();
            if (this.isAwakened) {
                // 觉醒：红黑色月牙刃
                ctx.arc(0, 0, this.radius, 0, Math.PI * 1.5, false);
                ctx.lineTo(0, 0);
                ctx.fillStyle = '#d90429'; ctx.fill();
                ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 3; ctx.stroke();
            } else {
                // 普通回旋镖：蓝白十字形/飞鸟形
                ctx.moveTo(-this.radius, -this.radius/2);
                ctx.lineTo(this.radius, 0);
                ctx.lineTo(-this.radius, this.radius/2);
                ctx.lineTo(-this.radius/2, 0);
                ctx.fillStyle = '#4cc9f0'; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();
        }
    }

    // 所有可能的升级选项配置库
    const possibleUpgrades = [
        { id: 'molotov', name: '燃烧瓶', desc: '在地面留下持续伤害的火区。满级：觉醒【幽冥地火】！', icon: '🍾' },
        { id: 'boomerang', name: '回旋镖', desc: '飞出并返回，造成两段伤害。满级：觉醒【磁爆回旋刃】！', icon: '🪃' },
        { id: 'dmg', name: '肌肉强化', desc: '增加伤害。满级：伤害爆炸翻倍！', icon: '💪' },
        { id: 'speed', name: '快手', desc: '提高射速。满级：变身加特林射速极快！', icon: '⚡' },
        { id: 'pierce', name: '穿甲弹', desc: '增加穿透。满级：额外+5次穿透！', icon: '🏹' },
        { id: 'aura', name: '能量光环', desc: '护体光环。满级：觉醒【地狱火领域】！', icon: '🛡️' },
        { id: 'heal', name: '急救包', desc: '恢复100生命。满级：春哥附体，血量上限大增并回满！', icon: '❤️' },
        { id: 'multishot', name: '散弹枪', desc: '增加多重射击。满级：觉醒【虚空等离子】！', icon: '🔫' },
        { id: 'lightning', name: '雷电发射器', desc: '降下落雷。满级：觉醒【天劫神雷】！', icon: '🌩️' },
        { id: 'guardian', name: '守卫者', desc: '召唤旋转飞刃。满级：觉醒【黄金轮锯】！', icon: '⚙️' },
        { id: 'magnet', name: '强力磁铁', desc: '增加拾取范围。满级：几乎全屏吸收！', icon: '🧲' },
        { id: 'movespeed', name: '运动鞋', desc: '提升移速。满级：移速飙升，凌波微步！', icon: '👟' },
        { id: 'maxhp', name: '健身指南', desc: '增加最大生命。满级：血牛降世！', icon: '📘' }
    ];

    class Player {
        constructor() {
            this.x = 0; this.y = 0; this.radius = 15; this.speed = 250; this.color = '#4ea8de';
            this.maxHp = 100; this.hp = 100; this.level = 1; this.xp = 0; this.xpNeeded = 50;
            this.damageMultiplier = 1; this.fireRateMultiplier = 1;
            
            // 主武器：子弹
            this.baseFireCooldown = 0.8; this.fireTimer = 0; this.bulletSpeed = 400; this.bulletDamage = 25; this.bulletPierce = 1;
            this.projectileCount = 1;
            
            // 武器：能量光环
            this.hasAura = false; this.auraRadius = 80; this.auraDamage = 10; this.auraTickRate = 0.5; this.auraTimer = 0;
            
            // 武器：闪电
            this.hasLightning = false; this.lightningTimer = 0; this.lightningDamage = 50; this.lightningBaseCooldown = 1.2; this.lightningTargets = 1;
            
            // 武器：守卫者
            this.guardianCount = 0; this.guardianAngle = 0;
            
            // 🌟新武器：燃烧瓶
            this.hasMolotov = false; this.molotovTimer = 0; this.molotovBaseCooldown = 3.0; this.molotovRadius = 60; this.molotovDamage = 15; this.molotovCount = 1;
            
            // 🌟新武器：回旋镖
            this.hasBoomerang = false; this.boomerangTimer = 0; this.boomerangBaseCooldown = 2.5; this.boomerangDamage = 40; this.boomerangCount = 1;
            
            this.pickupRange = 80; 
            this.upgrades = {};
            this.trail = [];

            if (currentMode === 'rampage') {
                this.speed = 350; this.fireRateMultiplier = 2; this.pickupRange = 150;
            }
        }

        update(dt) {
            let dx = 0, dy = 0;
            if (joyActive) { dx = joyDx; dy = joyDy; } 
            else {
                if (keys.w || keys.ArrowUp) dy -= 1; if (keys.s || keys.ArrowDown) dy += 1;
                if (keys.a || keys.ArrowLeft) dx -= 1; if (keys.d || keys.ArrowRight) dx += 1;
                if (dx !== 0 && dy !== 0) { const len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len; }
            }

            this.x += dx * this.speed * dt; this.y += dy * this.speed * dt;

            if (this.level >= 20 && (dx !== 0 || dy !== 0)) {
                this.trail.push({ x: this.x, y: this.y, life: 1.0 });
                if (this.trail.length > 15) this.trail.shift();
            }
            this.trail.forEach(t => t.life -= dt * 3);
            this.trail = this.trail.filter(t => t.life > 0);

            // 自动射击
            this.fireTimer -= dt;
            if (this.fireTimer <= 0) {
                this.shootNearest();
                this.fireTimer = this.baseFireCooldown / this.fireRateMultiplier;
            }

            // 🍾 燃烧瓶发射逻辑
            if (this.hasMolotov) {
                this.molotovTimer -= dt;
                if (this.molotovTimer <= 0) {
                    this.molotovTimer = this.molotovBaseCooldown;
                    if (enemies.length > 0) {
                        const isAwakened = (this.upgrades['molotov'] || 0) >= 5;
                        let throwCount = isAwakened ? this.molotovCount : Math.min(this.molotovCount, enemies.length);
                        for(let i=0; i<throwCount; i++) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)];
                            const zoneType = isAwakened ? 'blueFire' : 'fire';
                            // 在目标脚下直接爆开火区
                            damageZones.push(new DamageZone(target.x + (Math.random()*60-30), target.y + (Math.random()*60-30), this.molotovRadius, this.molotovDamage * this.damageMultiplier, zoneType));
                        }
                        soundManager.playShoot();
                    }
                }
            }

            // 🪃 回旋镖发射逻辑
            if (this.hasBoomerang) {
                this.boomerangTimer -= dt;
                if (this.boomerangTimer <= 0) {
                    this.boomerangTimer = this.boomerangBaseCooldown;
                    const isAwakened = (this.upgrades['boomerang'] || 0) >= 5;
                    const bCount = isAwakened ? 6 : this.boomerangCount;
                    // 朝四周发射
                    for(let i=0; i<bCount; i++) {
                        const angle = (Math.PI * 2 / bCount) * i + gameTime;
                        boomerangs.push(new Boomerang(this.x, this.y, angle, 600, this.boomerangDamage * this.damageMultiplier, 12, isAwakened));
                    }
                    soundManager.playShoot();
                }
            }

            if (this.hasAura) {
                this.auraTimer -= dt;
                if (this.auraTimer <= 0) {
                    this.applyAuraDamage();
                    this.auraTimer = this.auraTickRate;
                }
            }

            if (this.hasLightning) {
                this.lightningTimer -= dt;
                if (this.lightningTimer <= 0) {
                    this.lightningTimer = this.lightningBaseCooldown;
                    if (enemies.length > 0) {
                        const isAwakened = (this.upgrades['lightning'] || 0) >= 5;
                        let targetsToHit = Math.min(this.lightningTargets, enemies.length);
                        for(let i = 0; i < targetsToHit; i++) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)];
                            target.takeDamage(this.lightningDamage * this.damageMultiplier);
                            effects.push(new Effect(this.x, this.y - 300, target.x, target.y, isAwakened));
                            if (isAwakened) {
                                damageZones.push(new DamageZone(target.x, target.y, 80, this.lightningDamage * this.damageMultiplier, 'lightning'));
                            }
                        }
                        soundManager.playShoot();
                    }
                }
            }

            if (this.guardianCount > 0) {
                const isAwakened = (this.upgrades['guardian'] || 0) >= 5;
                const rotSpeed = isAwakened ? 6 : 3; 
                this.guardianAngle += rotSpeed * dt;
                const distRadius = isAwakened ? 110 : 70; 
                for (let i = 0; i < this.guardianCount; i++) {
                    const angle = this.guardianAngle + (Math.PI * 2 / this.guardianCount) * i;
                    const gx = this.x + Math.cos(angle) * distRadius;
                    const gy = this.y + Math.sin(angle) * distRadius;
                    const hitRadius = isAwakened ? 25 : 10;
                    for (let e of enemies) {
                        if (Math.hypot(e.x - gx, e.y - gy) < e.radius + hitRadius) {
                            e.takeDamage((isAwakened ? 30 : 15) * this.damageMultiplier * dt * 30);
                        }
                    }
                }
            }
        }

        draw() {
            if (this.level >= 20) {
                this.trail.forEach((t, i) => {
                    ctx.beginPath(); ctx.arc(t.x, t.y, this.radius - 2, 0, Math.PI * 2);
                    const hue = (gameTime * 200 + i * 20) % 360;
                    ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${t.life * 0.4})`;
                    ctx.fill();
                });
            }

            if (this.hasAura) {
                const isAwakened = (this.upgrades['aura'] || 0) >= 5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.auraRadius, 0, Math.PI * 2);
                if (isAwakened) {
                    const pulse = 1 + Math.sin(gameTime * 15) * 0.05;
                    ctx.arc(this.x, this.y, this.auraRadius * pulse, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(217, 4, 41, 0.3)';
                    ctx.strokeStyle = 'rgba(239, 35, 60, 0.8)';
                    ctx.lineWidth = 4;
                } else {
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.2)';
                    ctx.strokeStyle = 'rgba(255, 200, 0, 0.5)';
                    ctx.lineWidth = 2;
                }
                ctx.fill(); ctx.stroke();
            }

            if (this.guardianCount > 0) {
                const isAwakened = (this.upgrades['guardian'] || 0) >= 5;
                const distRadius = isAwakened ? 110 : 70;
                for (let i = 0; i < this.guardianCount; i++) {
                    const angle = this.guardianAngle + (Math.PI * 2 / this.guardianCount) * i;
                    const gx = this.x + Math.cos(angle) * distRadius;
                    const gy = this.y + Math.sin(angle) * distRadius;
                    ctx.save();
                    ctx.translate(gx, gy);
                    if (isAwakened) {
                        ctx.rotate(gameTime * 15);
                        ctx.beginPath();
                        for(let j=0; j<8; j++) {
                            ctx.lineTo(20 * Math.cos(j * Math.PI/4), 20 * Math.sin(j * Math.PI/4));
                            ctx.lineTo(12 * Math.cos((j+0.5) * Math.PI/4), 12 * Math.sin((j+0.5) * Math.PI/4));
                        }
                        ctx.closePath();
                        ctx.fillStyle = '#ffd166'; ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fillStyle = '#ef233c'; ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2);
                        ctx.fillStyle = '#f15bb5'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    }
                    ctx.restore();
                }
            }

            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (this.level >= 20) {
                ctx.rotate(gameTime * 3);
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius + 15, this.radius + 5, (i * Math.PI) / 3, 0, Math.PI * 2);
                    const hue = (gameTime * 150 + i * 40) % 360;
                    ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill();
                ctx.shadowBlur = 20; ctx.shadowColor = '#00f5d4';
            } else if (this.level >= 10) {
                ctx.rotate(gameTime * 2);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) { ctx.moveTo(0, 0); ctx.lineTo(28, 0); ctx.rotate(Math.PI / 3); }
                ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4; ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd166'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
            } else if (this.level >= 5) {
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = '#9b5de5'; ctx.fill(); ctx.strokeStyle = '#00f5d4';
                ctx.lineWidth = 3; ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();

            const hpWidth = 40; const hpRatio = this.hp / this.maxHp;
            ctx.fillStyle = 'red'; ctx.fillRect(this.x - hpWidth/2, this.y - this.radius - 20, hpWidth, 5);
            ctx.fillStyle = '#0f0'; ctx.fillRect(this.x - hpWidth/2, this.y - this.radius - 20, hpWidth * hpRatio, 5);
        }

        shootNearest() {
            if (enemies.length === 0) return;
            let nearestEnemy = null, minDistance = Infinity;

            for (let enemy of enemies) {
                const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                if (dist < minDistance) { minDistance = dist; nearestEnemy = enemy; }
            }

            if (nearestEnemy && minDistance < 600) {
                const baseAngle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                const spread = 0.2; 
                const isAwakened = (this.upgrades['multishot'] || 0) >= 5;

                for(let i = 0; i < this.projectileCount; i++) {
                    const angleOffset = (i - (this.projectileCount - 1) / 2) * spread;
                    bullets.push(new Bullet(this.x, this.y, baseAngle + angleOffset, 
                                            isAwakened ? this.bulletSpeed * 1.5 : this.bulletSpeed, 
                                            isAwakened ? this.bulletDamage * this.damageMultiplier * 2 : this.bulletDamage * this.damageMultiplier, 
                                            isAwakened ? 999 : this.bulletPierce, 
                                            isAwakened));
                }
                soundManager.playShoot();
            }
        }

        applyAuraDamage() {
            for (let enemy of enemies) {
                if (Math.hypot(enemy.x - this.x, enemy.y - this.y) < this.auraRadius + enemy.radius) {
                    enemy.takeDamage(this.auraDamage * this.damageMultiplier);
                }
            }
        }

        gainXp(amount) {
            this.xp += amount;
            while (this.xp >= this.xpNeeded) {
                this.xp -= this.xpNeeded;
                this.level++;
                if (currentMode === 'rampage') { this.xpNeeded = Math.floor(this.xpNeeded * 1.15) + 50; } 
                else { this.xpNeeded = Math.floor(this.xpNeeded * 1.3) + 20; }
                
                if (this.level === 20) soundManager.playAwaken();
                else soundManager.playLevelUp();
                
                triggerLevelUp();
            }
            updateHUD();
        }

        takeDamage(amount) {
            this.hp -= amount;
            if (this.hp <= 0) { this.hp = 0; gameOver(); }
        }
    }

    class Enemy {
        constructor(x, y, type = 'normal') {
            this.x = x; this.y = y;
            const timeScaling = 1 + (gameTime / 60) * 1.5; 
            const dmgScaling = 1 + (gameTime / 120);

            this.isElite = false;
            this.isBoss = false;

            if (type === 'fast') {
                this.radius = 10; this.speed = 180; this.hp = 20 * timeScaling; this.color = '#f72585'; this.damage = 5 * dmgScaling; this.xpValue = 15;
            } else if (type === 'tank') {
                this.radius = 25; this.speed = 60; this.hp = 150 * timeScaling; this.color = '#7209b7'; this.damage = 20 * dmgScaling; this.xpValue = 50;
            } else if (type === 'elite') {
                this.radius = 20; this.speed = 110; this.hp = 300 * timeScaling; this.color = '#fca311'; this.damage = 25 * dmgScaling; this.xpValue = 100;
                this.isElite = true;
            } else if (type === 'boss') {
                this.radius = 50; this.speed = 70; this.hp = 2500 * timeScaling; this.color = '#d90429'; this.damage = 40 * dmgScaling; this.xpValue = 500;
                this.isBoss = true;
            } else { 
                this.radius = 14; this.speed = 100; this.hp = 40 * timeScaling; this.color = '#e63946'; this.damage = 10 * dmgScaling; this.xpValue = 10;
            }

            if (currentMode === 'rampage') { this.speed *= 1.4; this.damage *= 1.5; this.hp *= 1.2; this.xpValue = Math.floor(this.xpValue * 1.5); }
            this.markedForDeletion = false;
        }

        update(dt) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed * dt; this.y += Math.sin(angle) * this.speed * dt;

            if (Math.hypot(player.x - this.x, player.y - this.y) < this.radius + player.radius) {
                player.takeDamage(this.damage * dt);
                this.x -= Math.cos(angle) * 2; this.y -= Math.sin(angle) * 2;
            }
        }

        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 2; ctx.stroke();
        }

        takeDamage(amount) {
            this.hp -= amount;
            floatingTexts.push(new FloatingText(this.x, this.y, Math.round(amount), '#fff'));
            soundManager.playHit();
            
            const knockback = this.isBoss ? 0.5 : (this.isElite ? 2 : 5);
            const angle = Math.atan2(this.y - player.y, this.x - player.x);
            this.x += Math.cos(angle) * knockback; this.y += Math.sin(angle) * knockback;

            if (this.hp <= 0 && !this.markedForDeletion) {
                this.markedForDeletion = true; killCount++;
                
                if (this.isElite || this.isBoss) {
                    chests.push(new Chest(this.x, this.y));
                    if (this.isBoss) {
                        for(let i=0; i<10; i++) gems.push(new Gem(this.x + Math.random()*60-30, this.y + Math.random()*60-30, 50));
                    }
                } else {
                    gems.push(new Gem(this.x, this.y, this.xpValue));
                }
            }
        }
    }

    class Chest {
        constructor(x, y) {
            this.x = x; this.y = y; this.radius = 15;
            this.markedForDeletion = false;
            this.pulseTime = 0;
        }
        update(dt) {
            this.pulseTime += dt * 5;
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < player.pickupRange) {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 300 * dt; this.y += Math.sin(angle) * 300 * dt;
                
                if (dist < player.radius + this.radius) {
                    this.markedForDeletion = true;
                    soundManager.playLevelUp();
                    triggerLevelUp(); 
                }
            }
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            const scale = 1 + Math.sin(this.pulseTime) * 0.1;
            ctx.scale(scale, scale);
            ctx.fillStyle = '#ffb703'; ctx.fillRect(-10, -8, 20, 16);
            ctx.strokeStyle = '#fb8500'; ctx.lineWidth = 2; ctx.strokeRect(-10, -8, 20, 16);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowBlur = 15; ctx.shadowColor = '#ffd166';
            ctx.strokeStyle = `rgba(255, 209, 102, ${0.5 + Math.sin(this.pulseTime)*0.5})`;
            ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, angle, speed, damage, pierce, isPlasma = false) {
            this.x = x; this.y = y;
            this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.radius = isPlasma ? 18 : 6; 
            this.damage = damage; this.pierce = pierce;
            this.isPlasma = isPlasma; 
            this.hitEnemies = new Set(); this.lifeTime = 2; this.markedForDeletion = false;
        }
        update(dt) {
            this.x += this.vx * dt; this.y += this.vy * dt; this.lifeTime -= dt;
            if (this.lifeTime <= 0) this.markedForDeletion = true;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            if (this.isPlasma) {
                ctx.fillStyle = '#4cc9f0'; ctx.shadowBlur = 20; ctx.shadowColor = '#4361ee';
                ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill();
            } else {
                ctx.fillStyle = '#fee440'; ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = '#fee440';
            }
        }
    }

    class Gem {
        constructor(x, y, value) {
            this.x = x + (Math.random() * 20 - 10); this.y = y + (Math.random() * 20 - 10);
            this.value = value; this.radius = value > 20 ? 8 : 5;
            this.color = value > 20 ? '#06d6a0' : '#80ed99';
            this.markedForDeletion = false; this.isMagnetic = false; 
        }
        update(dt) {
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < player.pickupRange || this.isMagnetic) {
                this.isMagnetic = true; 
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 500 * dt; this.y += Math.sin(angle) * 500 * dt;
                if (dist < player.radius + this.radius) {
                    soundManager.playExp(); player.gainXp(this.value); this.markedForDeletion = true;
                }
            }
        }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y);
            ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
            ctx.closePath(); ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
        }
    }

    class FloatingText {
        constructor(x, y, text, color) {
            this.x = x + (Math.random() * 20 - 10); this.y = y - 10;
            this.text = text; this.color = color; this.life = 0.8; this.vy = -30;
        }
        update(dt) { this.y += this.vy * dt; this.life -= dt; }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life / 0.8);
            ctx.font = 'bold 16px Arial'; ctx.fillStyle = this.color;
            ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = 1.0;
        }
    }

    const camera = { x: 0, y: 0 };
    let player;
    let enemies = [];
    let bullets = [];
    let boomerangs = []; // 新增回旋镖数组
    let gems = [];
    let chests = []; 
    let floatingTexts = [];
    let effects = []; 
    let damageZones = []; 
    let spawnTimer = 0;
    let spawnInterval = 1.5; 
    let eliteTimer = 20; 
    let lastBossMinute = 0; 

    function saveScore() {
        let scores = JSON.parse(localStorage.getItem('survivor_leaderboard')) || [];
        scores.push({ time: gameTime, kills: killCount, mode: currentMode === 'rampage' ? '狂暴' : '经典' });
        scores.sort((a, b) => b.time - a.time || b.kills - a.kills);
        scores = scores.slice(0, 8);
        localStorage.setItem('survivor_leaderboard', JSON.stringify(scores));
    }

    function showLeaderboard() {
        startPanel.style.display = 'none'; gameoverPanel.style.display = 'none'; leaderboardPanel.style.display = 'block';
        const list = document.getElementById('leaderboard-list');
        let scores = JSON.parse(localStorage.getItem('survivor_leaderboard')) || [];
        if (scores.length === 0) { list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">暂无记录</td></tr>'; return; }
        list.innerHTML = scores.map((s, index) => `
            <tr style="border-bottom: 1px solid #4a4e69; line-height: 2.5;">
                <td>#${index + 1}</td><td style="color: ${s.mode === '狂暴' ? '#ff5c77' : '#00f5d4'}">${s.mode}</td>
                <td>${formatTime(s.time)}</td><td>${s.kills}</td>
            </tr>
        `).join('');
    }
    function hideLeaderboard() { leaderboardPanel.style.display = 'none'; startPanel.style.display = 'block'; }

    function openSettings() {
        if(gameState !== 'playing') return;
        gameState = 'paused'; soundManager.stopBGM(); resetInput();
        
        currentBuffsList.innerHTML = '';
        if (Object.keys(player.upgrades).length === 0) {
            currentBuffsList.innerHTML = '<div style="color:#aaa; font-style:italic;">目前一穷二白，啥也没捞着</div>';
        } else {
            for (let [id, level] of Object.entries(player.upgrades)) {
                const buffInfo = possibleUpgrades.find(u => u.id === id);
                if(buffInfo) {
                    const isMax = level >= 5;
                    currentBuffsList.innerHTML += `
                        <div class="buff-item ${isMax ? 'maxed' : ''}">
                            <span class="buff-item-name">${buffInfo.icon} ${buffInfo.name}</span>
                            <span class="buff-item-lvl ${isMax ? 'max-text' : ''}">${isMax ? 'MAX 👑' : `Lv.${level}`}</span>
                        </div>
                    `;
                }
            }
        }
        
        settingsPanel.style.display = 'block'; settingsBtn.style.display = 'none'; joystickZone.style.display = 'none';
    }

    function resumeGame() {
        settingsPanel.style.display = 'none'; settingsBtn.style.display = 'block'; joystickZone.style.display = 'block';
        gameState = 'playing'; lastTime = performance.now(); soundManager.startBGM(); requestAnimationFrame(gameLoop);
    }
    function forceEndGame() { settingsPanel.style.display = 'none'; player.hp = 0; gameOver(); }

    function startGame(mode = 'classic') {
        currentMode = mode; resetInput(); player = new Player();
        enemies = []; bullets = []; boomerangs = []; gems = []; chests = []; floatingTexts = []; effects = []; damageZones = [];
        gameTime = 0; killCount = 0; spawnInterval = 1.5; 
        eliteTimer = 20; lastBossMinute = 0;
        
        startPanel.style.display = 'none'; gameoverPanel.style.display = 'none'; 
        levelupPanel.style.display = 'none'; leaderboardPanel.style.display = 'none'; settingsPanel.style.display = 'none';
        
        xpContainer.style.display = 'block'; levelText.style.display = 'block'; 
        timerText.style.display = 'block'; settingsBtn.style.display = 'block'; joystickZone.style.display = 'block'; 
        
        updateHUD(); gameState = 'playing'; lastTime = performance.now(); soundManager.startBGM(); requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameState = 'gameover'; soundManager.stopBGM(); resetInput();
        xpContainer.style.display = 'none'; levelText.style.display = 'none'; 
        timerText.style.display = 'none'; settingsBtn.style.display = 'none'; joystickZone.style.display = 'none'; 
        
        saveScore(); 
        finalStats.innerHTML = `模式: ${currentMode === 'rampage' ? '🩸 狂暴' : '🌿 经典'}<br>存活时间: ${formatTime(gameTime)} <br> 击杀数: ${killCount} <br> 最终等级: ${player.level}`;
        gameoverPanel.style.display = 'block';
    }

    function updateHUD() {
        const percent = (player.xp / player.xpNeeded) * 100;
        xpBar.style.width = `${percent}%`; levelText.innerText = `Lv. ${player.level}`; timerText.innerText = formatTime(gameTime);
    }

    function handleSpawning(dt) {
        spawnTimer -= dt; spawnInterval = Math.max(0.2, 1.5 - (gameTime / 60) * 0.4);
        
        eliteTimer -= dt;
        if (eliteTimer <= 0) {
            eliteTimer = 20 + Math.random() * 20;
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(canvas.width, canvas.height) / 2 + 150; 
            const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist;
            enemies.push(new Enemy(ex, ey, 'elite'));
        }

        const currentMinute = Math.floor(gameTime / 60);
        if (currentMinute > lastBossMinute) {
            lastBossMinute = currentMinute;
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(canvas.width, canvas.height) / 2 + 200; 
            const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist;
            enemies.push(new Enemy(ex, ey, 'boss'));
            floatingTexts.push(new FloatingText(player.x, player.y - 100, "⚠️ BOSS 降临！⚠️", '#ef233c'));
        }

        if (spawnTimer <= 0) {
            let spawnCount = Math.floor(1 + gameTime / 30); 
            if (currentMode === 'rampage') { spawnCount *= 3; spawnInterval = Math.max(0.05, spawnInterval * 0.5); }
            
            for(let i=0; i<spawnCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(canvas.width, canvas.height) / 2 + 100; 
                const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist;
                let type = 'normal'; const rand = Math.random();
                if (gameTime > 30 && rand < 0.2) type = 'fast';
                if (gameTime > 60 && rand > 0.9) type = 'tank';
                enemies.push(new Enemy(ex, ey, type));
            }
            spawnTimer = spawnInterval;
        }

        const cleanupDistSq = (Math.max(canvas.width, canvas.height) + 500) ** 2;
        enemies = enemies.filter(e => {
            const dSq = (e.x - player.x)**2 + (e.y - player.y)**2; return dSq < cleanupDistSq && !e.markedForDeletion;
        });
    }

    function triggerLevelUp() {
        gameState = 'levelup'; joystickZone.style.display = 'none'; resetInput();
        
        const availableUpgrades = possibleUpgrades.filter(u => (player.upgrades[u.id] || 0) < 5);
        let choices = [];
        
        if (availableUpgrades.length === 0) {
            choices = [{ id: 'fallback_meat', name: '美味烤肉', desc: '已经神功大成！恢复 100 点生命值。', icon: '🍖' }];
        } else {
            const shuffled = [...availableUpgrades].sort(() => 0.5 - Math.random());
            choices = shuffled.slice(0, Math.min(3, shuffled.length));
        }
        
        upgradeOptions.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            const currentLvl = player.upgrades[choice.id] || 0;
            const isNextMax = currentLvl === 4; 
            
            btn.className = `upgrade-btn ${isNextMax ? 'max-level-btn' : ''}`;
            
            let lvlText = `<span style="float:right; color:#00f5d4;">新!</span>`;
            if (choice.id === 'fallback_meat') {
                lvlText = '';
            } else if (currentLvl > 0) {
                lvlText = `<span style="float:right; color:${isNextMax?'#fff':'#ffd166'};">Lv.${currentLvl + 1}${isNextMax?' 满级觉醒!':''}</span>`;
            }
            
            btn.innerHTML = `<strong>${choice.icon} ${choice.name}</strong> ${lvlText}<br><span style="font-size:14px; color:${isNextMax?'#fff':'#aaa'};">${choice.desc}</span>`;
            btn.onclick = () => applyUpgrade(choice.id);
            upgradeOptions.appendChild(btn);
        });
        
        levelupPanel.style.display = 'block';
    }

    function applyUpgrade(id) {
        if (id === 'fallback_meat') {
            player.hp = Math.min(player.maxHp, player.hp + 100);
            finishLevelUp(); return;
        }

        if(!player.upgrades[id]) player.upgrades[id] = 0;
        player.upgrades[id]++;
        const isMaxLevel = player.upgrades[id] === 5; 

        switch(id) {
            case 'molotov': // 新增：燃烧瓶
                if (!player.hasMolotov) player.hasMolotov = true;
                else {
                    player.molotovBaseCooldown = Math.max(0.5, player.molotovBaseCooldown - 0.4);
                    player.molotovRadius += 15;
                    player.molotovDamage += 10;
                    player.molotovCount += 1;
                }
                if (isMaxLevel) {
                    player.molotovCount = 5;
                    player.molotovRadius += 50;
                    player.molotovDamage *= 2;
                    soundManager.playAwaken();
                }
                break;
            case 'boomerang': // 新增：回旋镖
                if (!player.hasBoomerang) player.hasBoomerang = true;
                else {
                    player.boomerangBaseCooldown = Math.max(0.8, player.boomerangBaseCooldown - 0.3);
                    player.boomerangCount += 1;
                    player.boomerangDamage += 15;
                }
                if (isMaxLevel) {
                    player.boomerangCount = 6;
                    player.boomerangDamage *= 2;
                    soundManager.playAwaken();
                }
                break;
            case 'dmg': player.damageMultiplier += isMaxLevel ? 1.0 : 0.35; break; 
            case 'speed': player.fireRateMultiplier += isMaxLevel ? 0.8 : 0.25; break; 
            case 'pierce': player.bulletPierce += isMaxLevel ? 5 : 3; break; 
            case 'aura':
                if (!player.hasAura) player.hasAura = true;
                player.auraRadius += isMaxLevel ? 60 : 30; 
                player.auraDamage += isMaxLevel ? 50 : 20; 
                player.auraTickRate = Math.max(0.05, player.auraTickRate - 0.05); 
                break;
            case 'heal':
                player.hp = Math.min(player.maxHp, player.hp + 100);
                if(isMaxLevel) { player.maxHp += 200; player.hp = player.maxHp; } 
                break;
            case 'multishot':
                if(isMaxLevel) { soundManager.playAwaken(); } 
                else player.projectileCount += 2; 
                break;
            case 'lightning':
                player.hasLightning = true;
                player.lightningDamage += isMaxLevel ? 100 : 30; 
                player.lightningBaseCooldown = Math.max(0.2, player.lightningBaseCooldown - 0.15); 
                player.lightningTargets += isMaxLevel ? 3 : 1;
                if(isMaxLevel) soundManager.playAwaken(); 
                break;
            case 'guardian':
                player.guardianCount += isMaxLevel ? 4 : 2; 
                if(isMaxLevel) soundManager.playAwaken();
                break;
            case 'magnet': player.pickupRange += isMaxLevel ? 400 : 100; break; 
            case 'movespeed': player.speed *= isMaxLevel ? 1.5 : 1.2; break; 
            case 'maxhp':
                player.maxHp += isMaxLevel ? 200 : 50; 
                player.hp += isMaxLevel ? 200 : 50;
                break;
        }
        finishLevelUp();
    }

    function finishLevelUp() {
        levelupPanel.style.display = 'none'; joystickZone.style.display = 'block';
        lastTime = performance.now(); gameState = 'playing'; requestAnimationFrame(gameLoop);
    }

    function drawGrid() {
        ctx.strokeStyle = '#2a2a3e'; ctx.lineWidth = 1; const gridSize = 100;
        const startX = Math.floor(camera.x / gridSize) * gridSize; const startY = Math.floor(camera.y / gridSize) * gridSize;
        ctx.beginPath();
        for (let x = startX; x < camera.x + canvas.width + gridSize; x += gridSize) { ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height); }
        for (let y = startY; y < camera.y + canvas.height + gridSize; y += gridSize) { ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y); }
        ctx.stroke();
    }

    function gameLoop(timestamp) {
        if (gameState !== 'playing') return; 
        const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;
        if (dt > 0.1) { requestAnimationFrame(gameLoop); return; }

        gameTime += dt; updateHUD();

        player.update(dt); handleSpawning(dt);

        bullets.forEach(b => b.update(dt)); 
        boomerangs.forEach(b => b.update(dt)); // 🪃 更新回旋镖
        enemies.forEach(e => e.update(dt));
        gems.forEach(g => g.update(dt)); chests.forEach(c => c.update(dt)); 
        floatingTexts.forEach(ft => ft.update(dt));
        effects.forEach(eff => eff.update(dt)); damageZones.forEach(dz => dz.update(dt));

        // 碰撞：子弹 -> 敌人
        for (let b of bullets) {
            if (b.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || b.hitEnemies.has(e)) continue; 
                if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                    e.takeDamage(b.damage); b.hitEnemies.add(e); b.pierce--;
                    if (b.pierce <= 0) { b.markedForDeletion = true; break; }
                }
            }
        }

        // 碰撞：回旋镖 -> 敌人
        for (let b of boomerangs) {
            if (b.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || b.hitEnemies.has(e)) continue; 
                if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                    e.takeDamage(b.damage); 
                    b.hitEnemies.add(e); // 防止一帧内重复扣血，折返后会清空重新计算
                }
            }
        }

        bullets = bullets.filter(b => !b.markedForDeletion); 
        boomerangs = boomerangs.filter(b => !b.markedForDeletion); // 🪃 过滤回旋镖
        enemies = enemies.filter(e => !e.markedForDeletion);
        gems = gems.filter(g => !g.markedForDeletion); chests = chests.filter(c => !c.markedForDeletion);
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);
        effects = effects.filter(eff => eff.life > 0); damageZones = damageZones.filter(dz => dz.lifeTime > 0);

        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;

        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        drawGrid();
        damageZones.forEach(dz => dz.draw());
        gems.forEach(g => g.draw()); chests.forEach(c => c.draw());
        enemies.forEach(e => e.draw()); player.draw();
        bullets.forEach(b => b.draw()); 
        boomerangs.forEach(b => b.draw()); // 🪃 绘制回旋镖
        effects.forEach(eff => eff.draw()); floatingTexts.forEach(ft => ft.draw());

        ctx.restore(); 
        if (gameState === 'playing') requestAnimationFrame(gameLoop);
    }

    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
