    class Player {
        constructor(pClass) {
            this.x = 0; this.y = 0; this.radius = 15; 
            this.playerClass = pClass; 
            
            this.speed = 250; this.color = '#4ea8de';
            this.maxHp = 100; this.hp = 100; this.level = 1; this.xp = 0; this.xpNeeded = 50;
            this.damageMultiplier = 1; this.fireRateMultiplier = 1; this.cdr = 1.0; 
            this.critChance = 0.0; this.critMultiplier = 1.5; 
            this.xpMultiplier = 1.0; this.lifestealChance = 0.0; this.lifestealAmount = 1;
            this.pickupRange = 80; 
            this.invincibleTimer = 0; // 无敌帧时间

            // 职业属性加成
            if (pClass === 'warrior') {
                this.maxHp = 150; this.hp = 150; this.speed = 220; this.damageMultiplier = 1.2; this.color = '#e63946';
            } else if (pClass === 'mage') {
                this.maxHp = 80; this.hp = 80; this.speed = 240; this.damageMultiplier = 1.5; this.color = '#9b5de5';
            } else if (pClass === 'archer') {
                this.maxHp = 80; this.hp = 80; this.speed = 280; this.fireRateMultiplier = 1.5; this.color = '#06d6a0';
            }

            this.lastDirAngle = 0;
            this.baseFireCooldown = 0.8; this.fireTimer = 0; this.bulletSpeed = 400; this.bulletDamage = 25; this.bulletPierce = 1; this.projectileCount = 1;
            
            // 元气骑士系列 Buff 状态
            this.shieldCount = 0; this.maxShield = 0; this.shieldRegenTimer = 0; this.shieldRegenTime = 10;
            this.hasDeathRay = false; this.deathRayTimer = 0; this.deathRayCooldown = 4; this.deathRayDamage = 150;
            this.hasDeathBloom = false; this.deathBloomChance = 0; this.deathBloomDamage = 50;
            this.hasVoidSlash = false; this.voidSlashTimer = 0; this.voidSlashCooldown = 2; this.voidSlashDamage = 120; this.voidSlashRadius = 60;
            this.hasTurret = false; this.turretTimer = 0; this.turretCooldown = 6; this.turretDamage = 20;

            // 其他通用/专属武器
            this.hasAura = false; this.auraRadius = 80; this.auraDamage = 10; this.auraTickRate = 0.5; this.auraTimer = 0;
            this.hasLightning = false; this.lightningTimer = 0; this.lightningDamage = 50; this.lightningBaseCooldown = 1.2; this.lightningTargets = 1;
            this.guardianCount = 0; this.guardianAngle = 0;
            this.hasMolotov = false; this.molotovTimer = 0; this.molotovBaseCooldown = 3.0; this.molotovRadius = 60; this.molotovDamage = 15; this.molotovCount = 1;
            this.hasBoomerang = false; this.boomerangTimer = 0; this.boomerangBaseCooldown = 2.5; this.boomerangDamage = 40; this.boomerangCount = 1;
            this.hasMissile = false; this.missileTimer = 0; this.missileBaseCooldown = 2.0; this.missileDamage = 60; this.missileRadius = 50; this.missileCount = 1;
            this.hasBlackhole = false; this.blackholeTimer = 0; this.blackholeBaseCooldown = 8.0; this.blackholeDamage = 20; this.blackholeRadius = 80;
            this.hasFrost = false; this.frostTimer = 0; this.frostCooldown = 4.0; this.frostRadius = 150; this.frostDamage = 20;
            this.hasDrone = false; this.droneCount = 0; this.droneAngle = 0; this.droneFireTimer = 0; this.droneDamage = 15;
            this.hasAxe = false; this.axeTimer = 0; this.axeCooldown = 2.0; this.axeDamage = 40; this.axeCount = 1;
            this.hasShuriken = false; this.shurikenTimer = 0; this.shurikenCooldown = 1.5; this.shurikenDamage = 35; this.shurikenCount = 4;
            this.hasScythe = false; this.scytheTimer = 0; this.scytheCooldown = 1.8; this.scytheDamage = 80; this.scytheRadius = 90;
            this.hasThorns = false; this.thornsDamage = 25;
            this.hasShockwave = false; this.shockwaveTimer = 0; this.shockwaveCooldown = 3.0; this.shockwaveDamage = 40; this.shockwaveRadius = 200;
            this.hasMeteor = false; this.meteorTimer = 0; this.meteorCooldown = 5.0; this.meteorDamage = 100; this.meteorRadius = 120; this.meteorCount = 1;
            this.hasArrow = false; this.arrowTimer = 0; this.arrowCooldown = 1.5; this.arrowDamage = 50;

            this.upgrades = {}; this.trail = [];

            if (currentMode === 'rampage') { this.speed *= 1.2; this.fireRateMultiplier *= 1.5; this.pickupRange += 50; }
        }

        calcDamage(baseDamage) {
            let actualDmgMult = this.damageMultiplier;
            let actualFireRate = this.fireRateMultiplier;
            if (this.upgrades['berserker']) {
                const missingHpPercent = 1 - (this.hp / this.maxHp);
                const boost = missingHpPercent * (this.upgrades['berserker'] >= 5 ? 2.0 : 1.0); 
                actualDmgMult += boost; actualFireRate += boost;
            }
            let dmg = baseDamage * actualDmgMult; 
            let isCrit = Math.random() < this.critChance;
            if (isCrit) dmg *= this.critMultiplier; 
            return { dmg: dmg, isCrit: isCrit, fireRate: actualFireRate };
        }

        update(dt) {
            if (this.invincibleTimer > 0) this.invincibleTimer -= dt;

            let dx = 0, dy = 0;
            if (joyActive) { dx = joyDx; dy = joyDy; } 
            else {
                if (keys.w || keys.ArrowUp) dy -= 1; if (keys.s || keys.ArrowDown) dy += 1;
                if (keys.a || keys.ArrowLeft) dx -= 1; if (keys.d || keys.ArrowRight) dx += 1;
                if (dx !== 0 && dy !== 0) { const len = Math.sqrt(dx * dx + dy * dy); dx /= len; dy /= len; }
            }
            if (dx !== 0 || dy !== 0) { this.lastDirAngle = Math.atan2(dy, dx); }

            this.x += dx * this.speed * dt; this.y += dy * this.speed * dt;

            if (this.level >= 20 && (dx !== 0 || dy !== 0)) {
                this.trail.push({ x: this.x, y: this.y, life: 1.0 }); if (this.trail.length > 15) this.trail.shift();
            }
            this.trail.forEach(t => t.life -= dt * 3); this.trail = this.trail.filter(t => t.life > 0);

            const currentFireRate = this.calcDamage(0).fireRate;
            const aoeBonus = (this.upgrades['elemental']) ? (this.upgrades['elemental'] >= 5 ? 2.0 : 1 + this.upgrades['elemental']*0.15) : 1.0;

            // --- 新增技能逻辑 ---

            // 1. 圣骑士护盾恢复
            if (this.maxShield > 0) {
                if (this.shieldCount < this.maxShield) {
                    this.shieldRegenTimer -= dt;
                    if (this.shieldRegenTimer <= 0) {
                        this.shieldCount++;
                        this.shieldRegenTimer = this.shieldRegenTime;
                    }
                } else {
                    this.shieldRegenTimer = this.shieldRegenTime; 
                }
            }

            // 2. 幻影死光 (Death Ray)
            if (this.hasDeathRay && enemies.length > 0) {
                this.deathRayTimer -= dt;
                if (this.deathRayTimer <= 0) {
                    this.deathRayTimer = this.deathRayCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['death_ray'] || 0) >= 5;
                    const rayCount = isAwakened ? 2 : 1;
                    
                    for(let i=0; i<rayCount; i++) {
                        // 找最近的或者随机敌人
                        const target = enemies[Math.floor(Math.random() * enemies.length)];
                        const baseAngle = Math.atan2(target.y - this.y, target.x - this.x);
                        const angle = baseAngle + (i===1 ? Math.PI/6 : (i===2 ? -Math.PI/6 : 0)); // 散射
                        
                        const endX = this.x + Math.cos(angle) * 1500;
                        const endY = this.y + Math.sin(angle) * 1500;
                        
                        laserLines.push(new LaserLine([{x:this.x, y:this.y}, {x:endX, y:endY}], isAwakened));
                        soundManager.playShoot();

                        // 激光碰撞检测
                        const lineW = isAwakened ? 40 : 20;
                        const dmgInfo = this.calcDamage(this.deathRayDamage);
                        for (let e of enemies) {
                            let l2 = (endX - this.x)**2 + (endY - this.y)**2;
                            let t = Math.max(0, Math.min(1, ((e.x - this.x) * (endX - this.x) + (e.y - this.y) * (endY - this.y)) / l2));
                            let projX = this.x + t * (endX - this.x);
                            let projY = this.y + t * (endY - this.y);
                            let distSq = (e.x - projX)**2 + (e.y - projY)**2;
                            if (distSq < (e.radius + lineW/2)**2) {
                                e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit);
                            }
                        }
                    }
                }
            }

            // 3. 虚空斩 (Void Slash)
            if (this.hasVoidSlash && enemies.length > 0) {
                this.voidSlashTimer -= dt;
                if (this.voidSlashTimer <= 0) {
                    this.voidSlashTimer = this.voidSlashCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['void_slash'] || 0) >= 5;
                    const count = isAwakened ? 6 : 1;
                    for(let i=0; i<count; i++) {
                        const target = enemies[Math.floor(Math.random() * enemies.length)];
                        const angle = Math.random() * Math.PI * 2;
                        voidSlashes.push(new VoidSlash(target.x, target.y, angle, this.voidSlashRadius * aoeBonus, this.voidSlashDamage, isAwakened));
                    }
                    soundManager.playShoot();
                }
            }

            // 4. 迷你炮台 (Turret)
            if (this.hasTurret) {
                this.turretTimer -= dt;
                if (this.turretTimer <= 0) {
                    this.turretTimer = this.turretCooldown / this.cdr;
                    const isAwakened = (this.upgrades['turret'] || 0) >= 5;
                    turrets.push(new Turret(this.x, this.y, this.turretDamage, isAwakened));
                }
            }

            // --- 原有技能逻辑 ---

            this.fireTimer -= dt;
            if (this.fireTimer <= 0) { this.shootNearest(currentFireRate); this.fireTimer = this.baseFireCooldown / (currentFireRate * this.cdr); }

            if (this.hasShuriken) {
                this.shurikenTimer -= dt;
                if (this.shurikenTimer <= 0) {
                    this.shurikenTimer = this.shurikenCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['shuriken'] || 0) >= 5;
                    const count = isAwakened ? 8 : this.shurikenCount;
                    for(let i=0; i<count; i++) {
                        const angle = (Math.PI * 2 / count) * i + gameTime;
                        shurikens.push(new Shuriken(this.x, this.y, angle, 400, this.shurikenDamage, isAwakened));
                    }
                    soundManager.playShoot();
                }
            }

            if (this.hasScythe) {
                this.scytheTimer -= dt;
                if (this.scytheTimer <= 0) {
                    this.scytheTimer = this.scytheCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['scythe'] || 0) >= 5;
                    slashes.push(new Slash(this.x, this.y, this.lastDirAngle, this.scytheRadius, this.scytheDamage, isAwakened));
                    soundManager.playShoot();
                }
            }

            if (this.hasShockwave) {
                this.shockwaveTimer -= dt;
                if (this.shockwaveTimer <= 0) {
                    this.shockwaveTimer = this.shockwaveCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['shockwave'] || 0) >= 5;
                    shockwaves.push(new Shockwave(this.x, this.y, isAwakened ? this.shockwaveRadius * 1.5 : this.shockwaveRadius, this.shockwaveDamage));
                    soundManager.playShoot();
                }
            }

            if (this.hasMeteor) {
                this.meteorTimer -= dt;
                if (this.meteorTimer <= 0) {
                    this.meteorTimer = this.meteorCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['meteor'] || 0) >= 5;
                    const count = isAwakened ? this.meteorCount + 3 : this.meteorCount;
                    for(let i=0; i<count; i++) {
                        if (enemies.length > 0) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)];
                            meteors.push(new Meteor(target.x, target.y, this.meteorDamage, this.meteorRadius, isAwakened));
                        }
                    }
                }
            }

            if (this.hasArrow) {
                this.arrowTimer -= dt;
                if (this.arrowTimer <= 0) {
                    this.arrowTimer = this.arrowCooldown / (currentFireRate * this.cdr);
                    const isAwakened = (this.upgrades['arrow'] || 0) >= 5;
                    let nearestEnemy = null, minDistance = Infinity;
                    for (let enemy of enemies) { const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y); if (dist < minDistance) { minDistance = dist; nearestEnemy = enemy; } }
                    if (nearestEnemy) {
                        const angle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                        const count = isAwakened ? 3 : 1;
                        for(let i=0; i<count; i++) {
                            const offset = (i - Math.floor(count/2)) * 0.15;
                            arrows.push(new Arrow(this.x, this.y, angle + offset, 800, this.arrowDamage, isAwakened));
                        }
                        soundManager.playShoot();
                    }
                }
            }

            if (this.hasFrost) {
                this.frostTimer -= dt;
                if (this.frostTimer <= 0) {
                    this.frostTimer = this.frostCooldown / this.cdr; 
                    const isAwakened = (this.upgrades['frost'] || 0) >= 5;
                    const dmgInfo = this.calcDamage(this.frostDamage); const r = this.frostRadius * aoeBonus;
                    for (let e of enemies) {
                        if (Math.hypot(e.x - this.x, e.y - this.y) < r + e.radius) {
                            e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); e.slowTimer = isAwakened ? 5.0 : 2.5; e.speedMultiplier = isAwakened ? 0.1 : 0.5; 
                        }
                    }
                    effects.push(new Explosion(this.x, this.y, r, false, 'ice')); soundManager.playShoot();
                }
            }

            if (this.hasDrone) {
                this.droneAngle += 2 * dt; this.droneFireTimer -= dt;
                if (this.droneFireTimer <= 0) {
                    this.droneFireTimer = 0.5 / (currentFireRate * this.cdr); 
                    const isAwakened = (this.upgrades['drone'] || 0) >= 5;
                    let nearestEnemy = null; let minDistance = Infinity;
                    for (let enemy of enemies) { const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y); if (dist < minDistance) { minDistance = dist; nearestEnemy = enemy; } }
                    if (nearestEnemy && minDistance < 600) {
                        const distRadius = 60;
                        for(let i=0; i<this.droneCount; i++) {
                            const angle = this.droneAngle + (Math.PI * 2 / this.droneCount) * i;
                            const dx = this.x + Math.cos(angle) * distRadius; const dy = this.y + Math.sin(angle) * distRadius;
                            const targetAngle = Math.atan2(nearestEnemy.y - dy, nearestEnemy.x - dx);
                            bullets.push(new Bullet(dx, dy, targetAngle, 800, this.droneDamage, 1, isAwakened));
                        }
                        soundManager.playShoot();
                    }
                }
            }

            if (this.hasAxe) {
                this.axeTimer -= dt;
                if (this.axeTimer <= 0) {
                    this.axeTimer = this.axeCooldown / (currentFireRate * this.cdr); 
                    const isAwakened = (this.upgrades['axe'] || 0) >= 5;
                    for(let i=0; i<this.axeCount; i++) {
                        const vx = (Math.random() - 0.5) * 400; const vy = -600 - Math.random() * 200; 
                        axes.push(new Axe(this.x, this.y, vx, vy, this.axeDamage, isAwakened));
                    }
                    soundManager.playShoot();
                }
            }

            if (this.hasMissile) {
                this.missileTimer -= dt;
                if (this.missileTimer <= 0) {
                    this.missileTimer = this.missileBaseCooldown / (currentFireRate * this.cdr); 
                    const isAwakened = (this.upgrades['missile'] || 0) >= 5;
                    const mCount = isAwakened ? this.missileCount + 1 : this.missileCount;
                    for(let i=0; i<mCount; i++) { missiles.push(new Missile(this.x, this.y, this.missileDamage, this.missileRadius * aoeBonus, isAwakened)); }
                    soundManager.playShoot();
                }
            }

            if (this.hasBlackhole) {
                this.blackholeTimer -= dt;
                if (this.blackholeTimer <= 0) {
                    this.blackholeTimer = this.blackholeBaseCooldown / this.cdr; 
                    const isAwakened = (this.upgrades['blackhole'] || 0) >= 5;
                    const bx = this.x + (Math.random() * 400 - 200); const by = this.y + (Math.random() * 400 - 200);
                    blackHoles.push(new BlackHole(bx, by, this.blackholeRadius * aoeBonus, this.blackholeDamage, isAwakened)); soundManager.playShoot();
                }
            }

            if (this.hasMolotov) {
                this.molotovTimer -= dt;
                if (this.molotovTimer <= 0) {
                    this.molotovTimer = this.molotovBaseCooldown / this.cdr;
                    if (enemies.length > 0) {
                        const isAwakened = (this.upgrades['molotov'] || 0) >= 5;
                        let throwCount = isAwakened ? this.molotovCount : Math.min(this.molotovCount, enemies.length);
                        for(let i=0; i<throwCount; i++) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)]; const zoneType = isAwakened ? 'blueFire' : 'fire';
                            const dmgInfo = this.calcDamage(this.molotovDamage);
                            damageZones.push(new DamageZone(target.x + (Math.random()*60-30), target.y + (Math.random()*60-30), this.molotovRadius * aoeBonus, dmgInfo.dmg, zoneType));
                        }
                        soundManager.playShoot();
                    }
                }
            }

            if (this.hasBoomerang) {
                this.boomerangTimer -= dt;
                if (this.boomerangTimer <= 0) {
                    this.boomerangTimer = this.boomerangBaseCooldown / this.cdr; 
                    const isAwakened = (this.upgrades['boomerang'] || 0) >= 5;
                    const bCount = isAwakened ? 6 : this.boomerangCount;
                    for(let i=0; i<bCount; i++) {
                        const angle = (Math.PI * 2 / bCount) * i + gameTime;
                        boomerangs.push(new Boomerang(this.x, this.y, angle, 600, this.boomerangDamage, 12, isAwakened));
                    }
                    soundManager.playShoot();
                }
            }

            if (this.hasAura) {
                this.auraTimer -= dt;
                if (this.auraTimer <= 0) { 
                    const r = this.auraRadius * aoeBonus;
                    for (let enemy of enemies) {
                        if (Math.hypot(enemy.x - this.x, enemy.y - this.y) < r + enemy.radius) {
                            const dmgInfo = this.calcDamage(this.auraDamage); enemy.takeDamage(dmgInfo.dmg, dmgInfo.isCrit);
                        }
                    }
                    this.auraTimer = this.auraTickRate; 
                }
            }

            if (this.hasLightning) {
                this.lightningTimer -= dt;
                if (this.lightningTimer <= 0) {
                    this.lightningTimer = this.lightningBaseCooldown / this.cdr;
                    if (enemies.length > 0) {
                        const isAwakened = (this.upgrades['lightning'] || 0) >= 5; let targetsToHit = Math.min(this.lightningTargets, enemies.length);
                        for(let i = 0; i < targetsToHit; i++) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)]; const dmgInfo = this.calcDamage(this.lightningDamage);
                            target.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); effects.push(new Effect(this.x, this.y - 300, target.x, target.y, isAwakened));
                            if (isAwakened) damageZones.push(new DamageZone(target.x, target.y, 80 * aoeBonus, dmgInfo.dmg, 'lightning'));
                        }
                        soundManager.playShoot();
                    }
                }
            }

            if (this.guardianCount > 0) {
                const isAwakened = (this.upgrades['guardian'] || 0) >= 5; const rotSpeed = isAwakened ? 6 : 3; this.guardianAngle += rotSpeed * dt;
                const distRadius = isAwakened ? 110 : 70; 
                for (let i = 0; i < this.guardianCount; i++) {
                    const angle = this.guardianAngle + (Math.PI * 2 / this.guardianCount) * i;
                    const gx = this.x + Math.cos(angle) * distRadius; const gy = this.y + Math.sin(angle) * distRadius; const hitRadius = isAwakened ? 25 : 10;
                    for (let e of enemies) {
                        if (Math.hypot(e.x - gx, e.y - gy) < e.radius + hitRadius) { const dmgInfo = this.calcDamage(isAwakened ? 30 : 15); e.takeDamage(dmgInfo.dmg * dt * 30, dmgInfo.isCrit); }
                    }
                }
            }
        }

        draw() {
            if (this.level >= 20) {
                this.trail.forEach((t, i) => {
                    ctx.beginPath(); ctx.arc(t.x, t.y, this.radius - 2, 0, Math.PI * 2);
                    const hue = (gameTime * 200 + i * 20) % 360; ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${t.life * 0.4})`; ctx.fill();
                });
            }

            const aoeBonus = (this.upgrades['elemental']) ? (this.upgrades['elemental'] >= 5 ? 2.0 : 1 + this.upgrades['elemental']*0.15) : 1.0;

            if (this.hasAura) {
                const isAwakened = (this.upgrades['aura'] || 0) >= 5;
                const r = this.auraRadius * aoeBonus;
                ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                if (isAwakened) {
                    const pulse = 1 + Math.sin(gameTime * 15) * 0.05; ctx.arc(this.x, this.y, r * pulse, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(217, 4, 41, 0.3)'; ctx.strokeStyle = 'rgba(239, 35, 60, 0.8)'; ctx.lineWidth = 4;
                } else { ctx.fillStyle = 'rgba(255, 200, 0, 0.2)'; ctx.strokeStyle = 'rgba(255, 200, 0, 0.5)'; ctx.lineWidth = 2; }
                ctx.fill(); ctx.stroke();
            }

            // 绘制圣骑士护盾特效
            if (this.shieldCount > 0) {
                for(let i=0; i<this.shieldCount; i++) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 15 + i*8, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 245, 212, ${0.8 - i*0.2})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }

            if (this.hasDrone) {
                const distRadius = 60;
                for(let i=0; i<this.droneCount; i++) {
                    const angle = this.droneAngle + (Math.PI * 2 / this.droneCount) * i; const dx = this.x + Math.cos(angle) * distRadius; const dy = this.y + Math.sin(angle) * distRadius;
                    const isAwakened = (this.upgrades['drone'] || 0) >= 5;
                    ctx.save(); ctx.translate(dx, dy); ctx.rotate(angle);
                    if (isAwakened) {
                        ctx.fillStyle = '#2b2d42'; ctx.fillRect(-8, -8, 16, 16); ctx.fillStyle = (gameTime * 5 % 2 < 1) ? '#ef233c' : '#4cc9f0'; ctx.beginPath(); ctx.arc(0, -5, 3, 0, Math.PI*2); ctx.fill();
                    } else { ctx.fillStyle = '#8d99ae'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#edf2f4'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore();
                }
            }

            if (this.guardianCount > 0) {
                const isAwakened = (this.upgrades['guardian'] || 0) >= 5; const distRadius = isAwakened ? 110 : 70;
                for (let i = 0; i < this.guardianCount; i++) {
                    const angle = this.guardianAngle + (Math.PI * 2 / this.guardianCount) * i; const gx = this.x + Math.cos(angle) * distRadius; const gy = this.y + Math.sin(angle) * distRadius;
                    ctx.save(); ctx.translate(gx, gy);
                    if (isAwakened) {
                        ctx.rotate(gameTime * 15); ctx.beginPath();
                        for(let j=0; j<8; j++) { ctx.lineTo(20 * Math.cos(j * Math.PI/4), 20 * Math.sin(j * Math.PI/4)); ctx.lineTo(12 * Math.cos((j+0.5) * Math.PI/4), 12 * Math.sin((j+0.5) * Math.PI/4)); }
                        ctx.closePath(); ctx.fillStyle = '#ffd166'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fillStyle = '#ef233c'; ctx.fill();
                    } else { ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fillStyle = '#f15bb5'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
                    ctx.restore();
                }
            }

            ctx.save(); ctx.translate(this.x, this.y);

            // 形态绘制
            if (this.level >= 40) {
                ctx.rotate(gameTime * 0.8);
                ctx.strokeStyle = '#fca311'; ctx.lineWidth = 2; ctx.setLineDash([15, 10, 5, 10]);
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 25, 0, Math.PI * 2); ctx.stroke();
                
                ctx.setLineDash([]); ctx.rotate(gameTime * -1.2); 
                
                ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 1; ctx.beginPath();
                for(let i=0; i<6; i++) { const a = (Math.PI*2 / 6) * i; ctx.lineTo(Math.cos(a) * (this.radius + 10), Math.sin(a) * (this.radius + 10)); }
                ctx.closePath(); ctx.stroke();

                ctx.beginPath(); ctx.arc(0, 0, this.radius + 2, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();
                ctx.beginPath(); ctx.arc(0, 0, this.radius - 2, 0, Math.PI * 2);
                ctx.fillStyle = this.invincibleTimer > 0 ? '#fff' : '#f72585'; 
                ctx.shadowBlur = 20; ctx.shadowColor = '#f72585'; ctx.fill(); ctx.shadowBlur = 0;
            } else if (this.level >= 30) {
                const wingPulse = Math.sin(gameTime * 6) * 6; 
                ctx.fillStyle = 'rgba(0, 245, 212, 0.4)'; ctx.shadowBlur = 15; ctx.shadowColor = '#00f5d4';
                
                ctx.beginPath(); ctx.ellipse(-20 - wingPulse, -10, 25 + wingPulse, 10, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.ellipse(20 + wingPulse, -10, 25 + wingPulse, 10, Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); 
                ctx.fillStyle = this.invincibleTimer > 0 ? '#fff' : this.color; ctx.fill(); 
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            } else if (this.level >= 20) {
                ctx.rotate(gameTime * 3);
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath(); ctx.ellipse(0, 0, this.radius + 15, this.radius + 5, (i * Math.PI) / 3, 0, Math.PI * 2);
                    const hue = (gameTime * 150 + i * 40) % 360; ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); 
                ctx.fillStyle = this.invincibleTimer > 0 ? '#aaa' : '#fff'; ctx.fill(); ctx.shadowBlur = 20; ctx.shadowColor = '#00f5d4';
            } else if (this.level >= 10) {
                ctx.rotate(gameTime * 2); ctx.beginPath();
                for (let i = 0; i < 6; i++) { ctx.moveTo(0, 0); ctx.lineTo(28, 0); ctx.rotate(Math.PI / 3); }
                ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4; ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 5, 0, Math.PI * 2); ctx.fillStyle = '#ffd166'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
            } else if (this.level >= 5) {
                ctx.beginPath(); ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2); 
                ctx.fillStyle = this.invincibleTimer > 0 ? '#fff' : this.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); 
                ctx.fillStyle = this.invincibleTimer > 0 ? '#fff' : this.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
            ctx.restore();

            const hpWidth = 40; const hpRatio = this.hp / this.maxHp;
            ctx.fillStyle = 'red'; ctx.fillRect(this.x - hpWidth/2, this.y - this.radius - 20, hpWidth, 5);
            ctx.fillStyle = '#0f0'; ctx.fillRect(this.x - hpWidth/2, this.y - this.radius - 20, hpWidth * hpRatio, 5);
        }

        shootNearest(currentFireRate) {
            if (enemies.length === 0) return; let nearestEnemy = null, minDistance = Infinity;
            for (let enemy of enemies) { const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y); if (dist < minDistance) { minDistance = dist; nearestEnemy = enemy; } }
            if (nearestEnemy && minDistance < 600) {
                const baseAngle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                const spread = 0.2; const isAwakened = (this.upgrades['multishot'] || 0) >= 5;
                for(let i = 0; i < this.projectileCount; i++) {
                    const angleOffset = (i - (this.projectileCount - 1) / 2) * spread;
                    bullets.push(new Bullet(this.x, this.y, baseAngle + angleOffset, isAwakened ? this.bulletSpeed * 1.5 : this.bulletSpeed, isAwakened ? this.bulletDamage * 2 : this.bulletDamage, isAwakened ? 999 : this.bulletPierce, isAwakened));
                }
                soundManager.playShoot();
            }
        }

        gainXp(amount) {
            this.xp += amount * this.xpMultiplier;
            while (this.xp >= this.xpNeeded) {
                this.xp -= this.xpNeeded; this.level++;
                if (currentMode === 'rampage' || currentMode === 'hard') { this.xpNeeded = Math.floor(this.xpNeeded * 1.15) + 50; } else { this.xpNeeded = Math.floor(this.xpNeeded * 1.3) + 20; }
                if (this.level === 20 || this.level === 30 || this.level === 40) soundManager.playAwaken(); else soundManager.playLevelUp();
                triggerLevelUp();
            }
            updateHUD();
        }

        takeDamage(amount) {
            if (this.invincibleTimer > 0) return;

            // 圣骑士护盾逻辑
            if (this.shieldCount > 0) {
                this.shieldCount--;
                this.invincibleTimer = 1.0; // 破盾后获得1秒无敌
                soundManager.playShoot(); 
                return;
            }

            this.hp -= amount; 
            if (this.hp <= 0) { this.hp = 0; gameOver(false); }
        }
    }

    class Enemy {
        constructor(x, y, type = 'normal') {
            this.x = x; this.y = y;
            let timeScaling = 1 + (gameTime / 60) * 1.5; 
            let dmgScaling = 1 + (gameTime / 120);

            if (currentMode === 'hard') { timeScaling = 1 + (gameTime / 60) * 3.0; dmgScaling = 1 + (gameTime / 60); }

            this.isElite = false; this.isBoss = false;

            if (type === 'fast') {
                this.radius = 10; this.speed = 180; this.hp = 20 * timeScaling; this.color = '#f72585'; this.damage = 5 * dmgScaling; this.xpValue = 15;
            } else if (type === 'tank') {
                this.radius = 25; this.speed = 60; this.hp = 150 * timeScaling; this.color = '#7209b7'; this.damage = 20 * dmgScaling; this.xpValue = 50;
            } else if (type === 'elite') {
                this.radius = 20; this.speed = 110; this.hp = 300 * timeScaling; this.color = '#fca311'; this.damage = 25 * dmgScaling; this.xpValue = 100; this.isElite = true;
            } else if (type === 'boss') {
                this.radius = 50; this.speed = 70; this.hp = 2500 * timeScaling; this.color = '#d90429'; this.damage = 40 * dmgScaling; this.xpValue = 500; this.isBoss = true;
            } else { 
                this.radius = 14; this.speed = 100; this.hp = 40 * timeScaling; this.color = '#e63946'; this.damage = 10 * dmgScaling; this.xpValue = 10;
            }

            if (currentMode === 'rampage') { this.speed *= 1.4; this.damage *= 1.5; this.hp *= 1.2; this.xpValue = Math.floor(this.xpValue * 1.5); }
            if (currentMode === 'hard') { this.speed *= 1.2; }
            this.markedForDeletion = false; this.slowTimer = 0; this.speedMultiplier = 1.0; this.isPlagued = false; 
        }

        update(dt) {
            if (this.slowTimer > 0) { this.slowTimer -= dt; } else { this.speedMultiplier = 1.0; }
            const angle = Math.atan2(player.y - this.y, player.x - this.x); const actualSpeed = this.speed * this.speedMultiplier;
            this.x += Math.cos(angle) * actualSpeed * dt; this.y += Math.sin(angle) * actualSpeed * dt;

            if (Math.hypot(player.x - this.x, player.y - this.y) < this.radius + player.radius) {
                player.takeDamage(this.damage * dt); 
                this.x -= Math.cos(angle) * 2; this.y -= Math.sin(angle) * 2; 
                if (player.hasThorns) {
                    const dmgInfo = player.calcDamage(player.thornsDamage);
                    this.takeDamage(dmgInfo.dmg * dt * 5, false); 
                }
            }
        }

        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 2; ctx.stroke();
            if (this.slowTimer > 0) { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 191, 255, 0.4)'; ctx.fill(); }
            if (this.isPlagued) { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(114, 9, 183, 0.4)'; ctx.fill(); }
        }

        takeDamage(amount, isCrit = false) {
            this.hp -= amount;
            if (isCrit) { floatingTexts.push(new FloatingText(this.x, this.y, "Crit! " + Math.round(amount), '#ff5c77', true)); soundManager.playCrit(); } 
            else { floatingTexts.push(new FloatingText(this.x, this.y, Math.round(amount), '#fff', false)); soundManager.playHit(); }
            
            const knockback = this.isBoss ? 0.5 : (this.isElite ? 2 : 5); const angle = Math.atan2(this.y - player.y, this.x - player.x);
            this.x += Math.cos(angle) * knockback; this.y += Math.sin(angle) * knockback;

            if (this.hp <= 0 && !this.markedForDeletion) {
                this.markedForDeletion = true; killCount++;
                
                if (player.lifestealChance > 0 && Math.random() < player.lifestealChance) {
                    player.hp = Math.min(player.maxHp, player.hp + player.lifestealAmount);
                    floatingTexts.push(new FloatingText(player.x, player.y - 20, "+" + player.lifestealAmount, '#80ed99'));
                }

                // 死亡爆破 (Death Bloom)
                if (player.hasDeathBloom && Math.random() < player.deathBloomChance) {
                    effects.push(new Explosion(this.x, this.y, 80, player.upgrades['death_bloom'] >= 5, 'bloom'));
                    const dmgInfo = player.calcDamage(player.deathBloomDamage);
                    for(let e of enemies) { if(e !== this && Math.hypot(e.x - this.x, e.y - this.y) < 80) e.takeDamage(dmgInfo.dmg, false); }
                }
                
                if (this.isElite || this.isBoss) {
                    chests.push(new Chest(this.x, this.y));
                    if (this.isBoss) { for(let i=0; i<10; i++) gems.push(new Gem(this.x + Math.random()*60-30, this.y + Math.random()*60-30, 50)); }
                } else { gems.push(new Gem(this.x, this.y, this.xpValue)); }
            }
        }
    }

    // --- 游戏循环与系统逻辑 ---

    const camera = { x: 0, y: 0 };
    let enemies = []; let bullets = []; let boomerangs = []; let missiles = []; let blackHoles = []; let axes = []; let slashes = []; let laserLines = []; let orbitals = []; let shockwaves = []; let meteors = []; let arrows = []; let shurikens = []; let turrets = []; let voidSlashes = [];
    let gems = []; let chests = []; let floatingTexts = []; let effects = []; let damageZones = []; 
    let spawnTimer = 0; let spawnInterval = 1.5; let eliteTimer = 20; let lastBossMinute = 0; 

    function saveScore(isWin) {
        let scores = JSON.parse(localStorage.getItem('survivor_leaderboard')) || [];
        
        let cName = '战士';
        if (selectedClass === 'mage') cName = '法师';
        if (selectedClass === 'archer') cName = '射手';
        
        let mName = '经典';
        if (currentMode === 'rampage') mName = '狂暴';
        if (currentMode === 'hard') mName = '困难';
        if (currentMode === 'debug') mName = '调试';

        scores.push({ time: gameTime, kills: killCount, mode: mName, class: cName, win: isWin });
        scores.sort((a, b) => b.time - a.time || b.kills - a.kills); scores = scores.slice(0, 8);
        localStorage.setItem('survivor_leaderboard', JSON.stringify(scores));
    }

    function showLeaderboard() {
        startPanel.style.display = 'none'; gameoverPanel.style.display = 'none'; leaderboardPanel.style.display = 'block';
        const list = document.getElementById('leaderboard-list'); let scores = JSON.parse(localStorage.getItem('survivor_leaderboard')) || [];
        if (scores.length === 0) { list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">暂无记录</td></tr>'; return; }
        list.innerHTML = scores.map((s, index) => `
            <tr style="border-bottom: 1px solid #4a4e69; line-height: 2.5;">
                <td>#${index + 1} ${s.class}</td><td style="color: ${s.mode === '狂暴' ? '#ff5c77' : (s.mode==='困难'?'#9b5de5':'#00f5d4')}">${s.mode} ${s.win?'👑':''}</td>
                <td>${formatTime(s.time)}</td><td>${s.kills}</td>
            </tr>
        `).join('');
    }
    function hideLeaderboard() { leaderboardPanel.style.display = 'none'; startPanel.style.display = 'block'; }

    function openGM() {
        if(gameState !== 'playing') return;
        gameState = 'paused'; soundManager.stopBGM(); resetInput();
        renderGMList();
        gmPanel.style.display = 'block'; gmBtn.style.display = 'none'; settingsBtn.style.display = 'none'; joystickZone.style.display = 'none';
    }

    function closeGM() {
        gmPanel.style.display = 'none'; gmBtn.style.display = 'block'; settingsBtn.style.display = 'block'; joystickZone.style.display = 'block';
        gameState = 'playing'; lastTime = performance.now(); soundManager.startBGM(); requestAnimationFrame(gameLoop);
    }

    function renderGMList() {
        gmBuffList.innerHTML = '';
        possibleUpgrades.forEach(u => {
            if (u.classReq && u.classReq !== player.playerClass) return;
            const lvl = player.upgrades[u.id] || 0;
            const isMax = lvl >= 5;
            gmBuffList.innerHTML += `
                <div class="gm-row">
                    <span style="font-size:14px;">${u.icon} ${u.name} <span style="color:${isMax?'#ef233c':'#ffd166'}">Lv.${lvl}</span></span>
                    <div class="gm-actions" style="display:flex; gap:3px;">
                        <button style="background:#ffb703; color:#1a1a2e; padding:4px 6px;" onclick="gmSetBuffLevel('${u.id}', 0)" ${lvl===0?'disabled':''}>清空</button>
                        <button style="background:#4a4e69; color:white; padding:4px 8px;" onclick="gmSetBuffLevel('${u.id}', ${lvl - 1})" ${lvl===0?'disabled':''}>-1</button>
                        <button style="background:#4cc9f0; color:#1a1a2e; padding:4px 8px;" onclick="gmSetBuffLevel('${u.id}', ${lvl + 1})" ${isMax?'disabled':''}>+1</button>
                        <button class="max" style="padding:4px 6px;" onclick="gmSetBuffLevel('${u.id}', 5)" ${isMax?'disabled':''}>MAX</button>
                    </div>
                </div>
            `;
        });
    }

    function gmSetBuffLevel(id, targetLvl) {
        targetLvl = Math.max(0, Math.min(5, targetLvl));
        const hpPercent = player.hp / player.maxHp;
        
        let tempUpgrades = { ...player.upgrades };
        tempUpgrades[id] = targetLvl;
        if (tempUpgrades[id] <= 0) delete tempUpgrades[id];

        let newPlayer = new Player(player.playerClass);
        newPlayer.level = player.level;
        newPlayer.xp = player.xp;
        newPlayer.xpNeeded = player.xpNeeded;
        newPlayer.trail = player.trail;
        
        player = newPlayer;

        for(let key in tempUpgrades) {
            let lvl = tempUpgrades[key];
            for(let i=0; i<lvl; i++) { grantBuffLogic(key); }
        }

        player.hp = player.maxHp * hpPercent;
        renderGMList(); updateHUD(); 
    }

    function gmSetLevel(targetLvl) {
        while(player.level < targetLvl) {
            player.level++;
            if (player.level === 20 || player.level === 30 || player.level === 40) soundManager.playAwaken();
        }
        updateHUD();
    }

    function openSettings() {
        if(gameState !== 'playing') return;
        gameState = 'paused'; soundManager.stopBGM(); resetInput();
        currentBuffsList.innerHTML = '';
        if (Object.keys(player.upgrades).length === 0) { currentBuffsList.innerHTML = '<div style="color:#aaa; font-style:italic;">目前一穷二白，啥也没捞着</div>'; } 
        else {
            for (let [id, level] of Object.entries(player.upgrades)) {
                const buffInfo = possibleUpgrades.find(u => u.id === id);
                if(buffInfo) {

                    currentBuffsList.innerHTML += `<div class="buff-item ${isMax ? 'maxed' : ''}"><span class="buff-item-name">${buffInfo.icon} ${buffInfo.name}</span><span class="buff-item-lvl ${isMax ? 'max-text' : ''}">${isMax ? 'MAX 👑' : `Lv.${level}`}</span></div>`;
                }
            }
        }
        settingsPanel.style.display = 'block'; settingsBtn.style.display = 'none'; gmBtn.style.display = 'none'; joystickZone.style.display = 'none';

    function updateHUD() {
        const percent = (player.xp / player.xpNeeded) * 100; xpBar.style.width = `${percent}%`; 
        levelText.innerText = `Lv. ${player.level}`;

            timerText.innerText = formatTime(timeLeft);

    function handleSpawning(dt) {
        spawnTimer -= dt; spawnInterval = Math.max(0.2, 1.5 - (gameTime / 60) * 0.4);
        if (currentMode === 'hard') spawnInterval = Math.max(0.1, spawnInterval * 0.7);

        eliteTimer -= dt;
        if (eliteTimer <= 0) {
            eliteTimer = (currentMode === 'hard') ? (15 + Math.random()*15) : (20 + Math.random() * 20);
            const angle = Math.random() * Math.PI * 2; const dist = Math.max(canvas.width, canvas.height) / 2 + 150; 
            const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist; enemies.push(new Enemy(ex, ey, 'elite'));
        }
        const currentMinute = Math.floor(gameTime / 60);
        if (currentMinute > lastBossMinute) {
            lastBossMinute = currentMinute;
            const angle = Math.random() * Math.PI * 2; const dist = Math.max(canvas.width, canvas.height) / 2 + 200; 
            const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist; enemies.push(new Enemy(ex, ey, 'boss'));
            floatingTexts.push(new FloatingText(player.x, player.y - 100, "⚠️ BOSS 降临！⚠️", '#ef233c', true));
        }
        if (spawnTimer <= 0) {
            let spawnCount = Math.floor(1 + gameTime / 30); 
            if (currentMode === 'rampage') { spawnCount *= 3; spawnInterval = Math.max(0.05, spawnInterval * 0.5); }
            if (currentMode === 'hard') { spawnCount = Math.floor(spawnCount * 1.5); }

            for(let i=0; i<spawnCount; i++) {
                const angle = Math.random() * Math.PI * 2; const dist = Math.max(canvas.width, canvas.height) / 2 + 100; 
                const ex = player.x + Math.cos(angle) * dist; const ey = player.y + Math.sin(angle) * dist;
                let type = 'normal'; const rand = Math.random();
                if (gameTime > 30 && rand < 0.2) type = 'fast'; if (gameTime > 60 && rand > 0.9) type = 'tank';
                enemies.push(new Enemy(ex, ey, type));
            }
            spawnTimer = spawnInterval;
        }
        const cleanupDistSq = (Math.max(canvas.width, canvas.height) + 500) ** 2;
        enemies = enemies.filter(e => { const dSq = (e.x - player.x)**2 + (e.y - player.y)**2; return dSq < cleanupDistSq && !e.markedForDeletion; });
    }

    function triggerLevelUp() {
        gameState = 'levelup'; joystickZone.style.display = 'none'; resetInput();
        
        const availableUpgrades = possibleUpgrades.filter(u => {
            if ((player.upgrades[u.id] || 0) >= 5) return false;
            if (u.classReq && u.classReq !== player.playerClass) return false;
            return true;
        });

        let choices = [];
        if (availableUpgrades.length === 0) { choices = [{ id: 'fallback_meat', name: '美味烤肉', desc: '已经神功大成！恢复 100 点生命值。', icon: '🍖' }]; } 
        else { const shuffled = [...availableUpgrades].sort(() => 0.5 - Math.random()); choices = shuffled.slice(0, Math.min(3, shuffled.length)); }
        
        upgradeOptions.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button'); const currentLvl = player.upgrades[choice.id] || 0; const isNextMax = currentLvl === 4; 
            
            let btnClass = `upgrade-btn ${isNextMax ? 'max-level-btn' : ''}`;
            if (choice.classReq) btnClass += ' class-exclusive'; 

            btn.className = btnClass;

            let lvlText = `<span style="float:right; color:#00f5d4;">新!</span>`;
            if (choice.id === 'fallback_meat') { lvlText = ''; } else if (currentLvl > 0) { lvlText = `<span style="float:right; color:${isNextMax?'#fff':'#ffd166'};">Lv.${currentLvl + 1}${isNextMax?' 满级觉醒!':''}</span>`; }
            btn.innerHTML = `<strong>${choice.icon} ${choice.name}</strong> ${lvlText}<br><span style="font-size:14px; color:${isNextMax?'#fff':'#aaa'};">${choice.desc}</span>`;
            btn.onclick = () => applyUpgrade(choice.id); upgradeOptions.appendChild(btn);
        });
        levelupPanel.style.display = 'block';
    }

    function applyUpgrade(id) {
        if (id === 'fallback_meat') { player.hp = Math.min(player.maxHp, player.hp + 100); finishLevelUp(); return; }
        grantBuffLogic(id);
        finishLevelUp();
    }

    function grantBuffLogic(id) {
        if(!player.upgrades[id]) player.upgrades[id] = 0;
        if(player.upgrades[id] >= 5) return; 
        
        player.upgrades[id]++; const isMaxLevel = player.upgrades[id] === 5; 

        switch(id) {
            // --- 致敬元气的新增技能 ---
            case 'holy_shield':
                player.maxShield = isMaxLevel ? 3 : 1; 
                player.shieldRegenTime = Math.max(2, 10 - player.upgrades['holy_shield'] * 1.5);
                if(isMaxLevel) soundManager.playAwaken(); break;
            case 'death_ray':
                if(!player.hasDeathRay) player.hasDeathRay = true; else { player.deathRayCooldown = Math.max(1, player.deathRayCooldown - 0.5); player.deathRayDamage += 40; }
                if(isMaxLevel) { player.deathRayDamage *= 2; soundManager.playAwaken(); } break;
            case 'death_bloom':
                if(!player.hasDeathBloom) player.hasDeathBloom = true; player.deathBloomChance += isMaxLevel ? 0.5 : 0.1; player.deathBloomDamage += 20;
                if(isMaxLevel) soundManager.playAwaken(); break;
            case 'void_slash':
                if(!player.hasVoidSlash) player.hasVoidSlash = true; else { player.voidSlashCooldown = Math.max(0.5, player.voidSlashCooldown - 0.3); player.voidSlashDamage += 40; }
                if(isMaxLevel) { player.voidSlashRadius *= 1.5; soundManager.playAwaken(); } break;
            case 'turret':
                if(!player.hasTurret) player.hasTurret = true; else { player.turretCooldown = Math.max(2, player.turretCooldown - 1); player.turretDamage += 10; }
                if(isMaxLevel) soundManager.playAwaken(); break;

            // --- 原有技能 ---
            case 'shuriken':
                if(!player.hasShuriken) player.hasShuriken = true; else { player.shurikenCooldown = Math.max(0.5, player.shurikenCooldown - 0.2); player.shurikenDamage += 20; player.shurikenCount += 1; }
                if(isMaxLevel) { player.shurikenCount = 8; player.shurikenDamage *= 2; soundManager.playAwaken(); } break;
            case 'scythe':
                if(!player.hasScythe) player.hasScythe = true; else { player.scytheCooldown = Math.max(0.8, player.scytheCooldown - 0.2); player.scytheDamage += 30; player.scytheRadius += 10; }
                if(isMaxLevel) { player.scytheRadius += 50; player.scytheDamage *= 2; soundManager.playAwaken(); } break;
            case 'thorns':
                if(!player.hasThorns) player.hasThorns = true; else { player.thornsDamage += 20; }
                if(isMaxLevel) { player.thornsDamage *= 2.5; soundManager.playAwaken(); } break;
            case 'haste':
                player.cdr += isMaxLevel ? 0.5 : 0.15; 
                if(isMaxLevel) soundManager.playAwaken(); break;
            case 'shockwave':
                if(!player.hasShockwave) player.hasShockwave = true; else { player.shockwaveCooldown = Math.max(1.0, player.shockwaveCooldown - 0.4); player.shockwaveDamage += 20; player.shockwaveRadius += 20;}
                if(isMaxLevel) { player.shockwaveRadius += 100; player.shockwaveDamage *= 2; soundManager.playAwaken(); } break;
            case 'meteor':
                if(!player.hasMeteor) player.hasMeteor = true; else { player.meteorCooldown = Math.max(2.0, player.meteorCooldown - 0.6); player.meteorDamage += 50; player.meteorRadius += 20; }
                if(isMaxLevel) { player.meteorCount += 2; player.meteorDamage *= 2; soundManager.playAwaken(); } break;
            case 'arrow':
                if(!player.hasArrow) player.hasArrow = true; else { player.arrowCooldown = Math.max(0.5, player.arrowCooldown - 0.2); player.arrowDamage += 30; }
                if(isMaxLevel) { player.arrowDamage *= 2; soundManager.playAwaken(); } break; 
            case 'berserker': break;
            case 'elemental': break;
            case 'hawkeye': player.critChance += isMaxLevel ? 0.3 : 0.1; player.pickupRange += isMaxLevel ? 200 : 50; break;
            case 'xp_scroll': player.xpMultiplier += isMaxLevel ? 0.5 : 0.15; break;
            case 'vampire': player.lifestealChance += isMaxLevel ? 0.1 : 0.03; player.lifestealAmount += isMaxLevel ? 5 : 1; break;
            case 'frost':
                if(!player.hasFrost) player.hasFrost = true; else { player.frostCooldown = Math.max(1.0, player.frostCooldown - 0.5); player.frostRadius += 20; player.frostDamage += 10; }
                if(isMaxLevel) { player.frostRadius += 100; player.frostDamage *= 2; soundManager.playAwaken(); } break;
            case 'drone':
                if(!player.hasDrone) player.hasDrone = true; else { player.droneCount += 1; player.droneDamage += 10; }
                if(isMaxLevel) { player.droneCount += 2; player.droneDamage *= 2; soundManager.playAwaken(); } break;
            case 'axe':
                if(!player.hasAxe) player.hasAxe = true; else { player.axeCount += 1; player.axeDamage += 15; player.axeCooldown = Math.max(0.5, player.axeCooldown - 0.2); }
                if(isMaxLevel) { player.axeCount += 3; player.axeDamage *= 2; soundManager.playAwaken(); } break;
            case 'missile': 
                if(!player.hasMissile) player.hasMissile = true; else { player.missileBaseCooldown = Math.max(0.5, player.missileBaseCooldown - 0.3); player.missileDamage += 20; player.missileRadius += 10; }
                if (isMaxLevel) { player.missileCount += 2; player.missileDamage *= 2; player.missileRadius *= 1.5; soundManager.playAwaken(); } break;
            case 'blackhole': 
                if(!player.hasBlackhole) player.hasBlackhole = true; else { player.blackholeBaseCooldown = Math.max(4.0, player.blackholeBaseCooldown - 1.0); player.blackholeRadius += 15; player.blackholeDamage += 10; }
                if (isMaxLevel) { player.blackholeRadius += 50; player.blackholeDamage *= 2; soundManager.playAwaken(); } break;
            case 'crit': player.critChance += isMaxLevel ? 0.3 : 0.1; player.critMultiplier += isMaxLevel ? 1.0 : 0.3; break;
            case 'molotov': 
                if (!player.hasMolotov) player.hasMolotov = true; else { player.molotovBaseCooldown = Math.max(0.5, player.molotovBaseCooldown - 0.4); player.molotovRadius += 15; player.molotovDamage += 10; player.molotovCount += 1; }
                if (isMaxLevel) { player.molotovCount = 5; player.molotovRadius += 50; player.molotovDamage *= 2; soundManager.playAwaken(); } break;
            case 'boomerang': 
                if (!player.hasBoomerang) player.hasBoomerang = true; else { player.boomerangBaseCooldown = Math.max(0.8, player.boomerangBaseCooldown - 0.3); player.boomerangCount += 1; player.boomerangDamage += 15; }
                if (isMaxLevel) { player.boomerangCount = 6; player.boomerangDamage *= 2; soundManager.playAwaken(); } break;
            case 'dmg': player.damageMultiplier += isMaxLevel ? 1.0 : 0.35; break; 
            case 'speed': player.fireRateMultiplier += isMaxLevel ? 0.8 : 0.25; break; 
            case 'pierce': player.bulletPierce += isMaxLevel ? 5 : 3; break; 
            case 'aura':
                if (!player.hasAura) player.hasAura = true; player.auraRadius += isMaxLevel ? 60 : 30; player.auraDamage += isMaxLevel ? 50 : 20; player.auraTickRate = Math.max(0.05, player.auraTickRate - 0.05); break;
            case 'heal': player.hp = Math.min(player.maxHp, player.hp + 100); if(isMaxLevel) { player.maxHp += 200; player.hp = player.maxHp; } break;
            case 'multishot': if(isMaxLevel) { soundManager.playAwaken(); } else player.projectileCount += 2; break;
            case 'lightning':
                player.hasLightning = true; player.lightningDamage += isMaxLevel ? 100 : 30; player.lightningBaseCooldown = Math.max(0.2, player.lightningBaseCooldown - 0.15); player.lightningTargets += isMaxLevel ? 3 : 1;
                if(isMaxLevel) soundManager.playAwaken(); break;
            case 'guardian': player.guardianCount += isMaxLevel ? 4 : 2; if(isMaxLevel) soundManager.playAwaken(); break;
            case 'magnet': player.pickupRange += isMaxLevel ? 400 : 100; break; 
            case 'movespeed': player.speed *= isMaxLevel ? 1.5 : 1.2; break; 
            case 'maxhp': player.maxHp += isMaxLevel ? 200 : 50; player.hp += isMaxLevel ? 200 : 50; break;
        }
    }

    function finishLevelUp() {
        levelupPanel.style.display = 'none'; joystickZone.style.display = 'block';
        lastTime = performance.now(); gameState = 'playing'; requestAnimationFrame(gameLoop);
    }

    function drawGrid() {
        ctx.strokeStyle = '#2a2a3e'; ctx.lineWidth = 1; const gridSize = 100;
        const startX = Math.floor(camera.x / gridSize) * gridSize; const startY = Math.floor(camera.y / gridSize) * gridSize;
        ctx.beginPath();
        for (let x = startX; x < camera.x + canvas.width + gridSize; x += gridSize) { ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height); }
        for (let y = startY; y < camera.y + canvas.height + gridSize; y += gridSize) { ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y); }
        ctx.stroke();
    }

    function gameLoop(timestamp) {
        if (gameState !== 'playing') return; 
        const dt = (timestamp - lastTime) / 1000; lastTime = timestamp;
        if (dt > 0.1) { requestAnimationFrame(gameLoop); return; }

        gameTime += dt; updateHUD();

        player.update(dt); handleSpawning(dt);

        bullets.forEach(b => b.update(dt)); boomerangs.forEach(b => b.update(dt)); 
        missiles.forEach(m => m.update(dt)); blackHoles.forEach(bh => bh.update(dt)); axes.forEach(a => a.update(dt)); 
        slashes.forEach(s => s.update(dt)); laserLines.forEach(l => l.update(dt)); orbitals.forEach(o => o.update(dt));
        shockwaves.forEach(sw => sw.update(dt)); meteors.forEach(m => m.update(dt)); arrows.forEach(a => a.update(dt));
        shurikens.forEach(s => s.update(dt)); turrets.forEach(t => t.update(dt)); voidSlashes.forEach(vs => vs.update(dt));
        enemies.forEach(e => e.update(dt));
        gems.forEach(g => g.update(dt)); chests.forEach(c => c.update(dt)); 
        floatingTexts.forEach(ft => ft.update(dt));
        effects.forEach(eff => eff.update(dt)); damageZones.forEach(dz => dz.update(dt));

        for (let b of bullets) {
            if (b.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || b.hitEnemies.has(e)) continue; 
                if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                    const dmgInfo = player.calcDamage(b.baseDamage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); b.hitEnemies.add(e); b.pierce--;
                    if (b.pierce <= 0) { b.markedForDeletion = true; break; }
                }
            }
        }
        for (let a of arrows) {
            if (a.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || a.hitEnemies.has(e)) continue; 
                if (Math.hypot(a.x - e.x, a.y - e.y) < 15 + e.radius) {
                    const dmgInfo = player.calcDamage(a.damage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); a.hitEnemies.add(e); 
                }
            }
        }
        for (let b of boomerangs) {
            if (b.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || b.hitEnemies.has(e)) continue; 
                if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                    const dmgInfo = player.calcDamage(b.damage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); b.hitEnemies.add(e); 
                }
            }
        }
        for (let a of axes) {
            if (a.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion || a.hitEnemies.has(e)) continue; 
                if (Math.hypot(a.x - e.x, a.y - e.y) < a.radius + e.radius) {
                    const dmgInfo = player.calcDamage(a.damage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); a.hitEnemies.add(e); 
                }
            }
        }
        for (let s of shurikens) {
            if (s.markedForDeletion) continue;
            for (let e of enemies) {
                if (e.markedForDeletion) continue; 
                if (Math.hypot(s.x - e.x, s.y - e.y) < s.radius + e.radius) {
                    const dmgInfo = player.calcDamage(s.damage); e.takeDamage(dmgInfo.dmg, dmgInfo.isCrit); 
                    if (!s.isAwakened) s.markedForDeletion = true; 
                }
            }
        }

        bullets = bullets.filter(b => !b.markedForDeletion); boomerangs = boomerangs.filter(b => !b.markedForDeletion); 
        missiles = missiles.filter(m => !m.markedForDeletion); blackHoles = blackHoles.filter(bh => !bh.markedForDeletion); axes = axes.filter(a => !a.markedForDeletion);
        slashes = slashes.filter(s => !s.markedForDeletion); laserLines = laserLines.filter(l => l.life > 0); orbitals = orbitals.filter(o => !o.markedForDeletion);
        shockwaves = shockwaves.filter(sw => !sw.markedForDeletion); meteors = meteors.filter(m => !m.markedForDeletion); arrows = arrows.filter(a => !a.markedForDeletion);
        shurikens = shurikens.filter(s => !s.markedForDeletion); turrets = turrets.filter(t => !t.markedForDeletion); voidSlashes = voidSlashes.filter(vs => !vs.markedForDeletion);
        enemies = enemies.filter(e => !e.markedForDeletion); gems = gems.filter(g => !g.markedForDeletion); chests = chests.filter(c => !c.markedForDeletion);
        floatingTexts = floatingTexts.filter(ft => ft.life > 0); effects = effects.filter(eff => eff.life > 0); damageZones = damageZones.filter(dz => dz.lifeTime > 0);

        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;

        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        drawGrid(); damageZones.forEach(dz => dz.draw()); orbitals.forEach(o => o.draw()); blackHoles.forEach(bh => bh.draw());
        gems.forEach(g => g.draw()); chests.forEach(c => c.draw()); turrets.forEach(t => t.draw());
        enemies.forEach(e => e.draw()); player.draw();
        slashes.forEach(s => s.draw()); shockwaves.forEach(sw => sw.draw()); laserLines.forEach(l => l.draw()); meteors.forEach(m => m.draw()); voidSlashes.forEach(vs => vs.draw());
        bullets.forEach(b => b.draw()); arrows.forEach(a => a.draw()); boomerangs.forEach(b => b.draw()); 
        missiles.forEach(m => m.draw()); axes.forEach(a => a.draw()); shurikens.forEach(s => s.draw());
        effects.forEach(eff => eff.draw()); floatingTexts.forEach(ft => ft.draw());

        ctx.restore(); 
        if (gameState === 'playing') requestAnimationFrame(gameLoop);
    }

    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
