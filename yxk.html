<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的专属游戏库</title>
  <!-- 引入 Tailwind CSS 让页面变得好看 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

  <!-- 游戏库主界面 -->
  <div id="main-view" class="max-w-6xl mx-auto p-4 md:p-8">
    
    <!-- 头部区域 -->
    <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 flex items-center gap-2">
            🎮 我的游戏库
          </h1>
          <a href="https://chanhua05.github.io/ipppp" target="_blank" class="flex items-center gap-1 bg-blue-100 text-blue-600 hover:bg-blue-200 px-3 py-1 rounded-lg text-xs font-bold transition-colors shadow-sm">
            📡 检测IP
          </a>
        </div>
        <p class="text-slate-500 text-sm">欢迎回来！今天想重温哪个自己写的大作？</p>
      </div>
      
      <!-- 搜索框 -->
      <div class="relative w-full md:w-64">
        <input 
          type="text" 
          id="search-input"
          placeholder="🔍 搜索游戏名字..." 
          class="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all shadow-sm bg-white"
        >
      </div>
    </header>

    <!-- 分类按钮区 -->
    <div id="categories-container" class="flex gap-2 mb-6 overflow-x-auto pb-2">
      <!-- 按钮会用 JS 自动生成在这里 -->
    </div>

    <!-- 游戏卡片网格 -->
    <div id="games-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-5">
      <!-- 卡片会用 JS 自动生成在这里 -->
    </div>
  </div>

  <!-- 游戏全屏弹窗 (默认隐藏) -->
  <div id="game-modal" class="fixed inset-0 bg-slate-900 z-50 hidden flex-col">
    <!-- 弹窗顶部导航 -->
    <div class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-lg">
      <div class="flex items-center gap-3">
        <span id="modal-icon" class="text-3xl">🎮</span>
        <h2 id="modal-title" class="font-bold text-lg">游戏加载中...</h2>
      </div>
      <button 
        onclick="closeGame()"
        class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg transition-colors font-bold flex items-center gap-2"
      >
        ❌ 退出游戏
      </button>
    </div>

    <!-- 游戏画面区 -->
    <div class="flex-1 bg-black relative flex items-center justify-center">
      <!-- 真正用来装游戏的 iframe -->
      <iframe id="game-iframe" class="w-full h-full border-none hidden"></iframe>
      
      <!-- 如果没填链接，就显示这个提示 -->
      <div id="empty-url-msg" class="text-center bg-slate-800 p-8 rounded-2xl max-w-md hidden">
        <div class="text-6xl mb-4">🚧</div>
        <h3 class="text-2xl font-bold text-white mb-3">游戏链接还没填哦！</h3>
        <p class="text-slate-300 mb-6 text-left">
          你需要用记事本打开 <code class="bg-slate-700 px-2 py-1 rounded text-pink-400">index.html</code> 代码，找到这个游戏，把它的 <code class="bg-slate-700 px-2 py-1 rounded text-pink-400">url</code> 属性改成你游戏文件的名字。<br><br>
          举个例子：<br>
          <code class="bg-slate-700 px-2 py-1 rounded text-green-400">url: './snake.html'</code>
        </p>
        <button onclick="closeGame()" class="bg-indigo-500 text-white px-6 py-2 rounded-lg">好的，我去改</button>
      </div>
    </div>
  </div>

  <!-- 👇 核心逻辑：你的游戏数据都在这里！ -->
  <script>
    // 🌟 在这里填入你的小游戏信息！
    const myGames = [
      { 
        id: 1, 
        title: '爽爽割草', 
        category: '动作', 
        desc: '超解压的满屏割草游戏，疯狂收割敌人，爽感直接拉满！', 
        icon: '⚔️', 
        url: 'https://chanhua05.github.io/game/gecao.html' 
      },
      { 
        id: 2, 
        title: '雷霆战机', 
        category: '射击', 
        desc: '驾驶你的王牌战机，穿梭在枪林弹雨中，保卫宇宙和平！', 
        icon: '✈️', 
        url: 'https://chanhua05.github.io/game/ltzj.html'
      },
      { 
        id: 3, 
        title: '斗地主', 
        category: '棋牌', // 👈 换成棋牌分类啦
        desc: '经典三人斗地主！叫地主、抢地主、甩出王炸，看谁才是真正的牌神！', 
        icon: '🃏', 
        url: 'https://chanhua05.github.io/game/doudizhu' // 👈 斗地主的链接也安排上了！
      },
      { 
        id: 4, 
        title: '三国杀', 
        category: '策略', 
        desc: '经典策略卡牌对战！主公、忠臣、反贼、内奸，尔虞我诈，谁能笑到最后？', 
        icon: '🐉', 
        url: 'https://chanhua05.github.io/game/newrealchinakill.html' 
      },
      { 
        id: 5, 
        title: '魔方', 
        category: '益智', 
        desc: '3D经典魔方！转动指尖，挑战你的空间思维和手速，看看你能多快还原！', 
        icon: '🧩', 
        url: 'https://chanhua05.github.io/game/mofang' 
      },
      { 
        id: 6, 
        title: '狼人杀', 
        category: '推理', 
        desc: '天黑请闭眼... 伪装、逻辑与口才的较量，找出隐藏的狼人或者消灭所有好人！', 
        icon: '🐺', 
        url: 'https://chanhua05.github.io/ipppp/wolf' 
      },
      { 
        id: 7, 
        title: '水果忍者', 
        category: '动作', 
        desc: '划动指尖，切碎满天飞舞的水果！疯狂连击，果汁四溅，千万别切到炸弹哦！', 
        icon: '🍉', 
        url: 'https://chanhua05.github.io/game/sgrz.html' 
      }
    ];

    // 我在这里帮你加了一个“推理”分类哦！
    const categories = ['全部', '动作', '射击', '棋牌', '策略', '推理', '休闲', '益智'];
    let currentCategory = '全部';
    let searchQuery = '';

    // 获取页面上的元素
    const gamesGrid = document.getElementById('games-grid');
    const categoriesContainer = document.getElementById('categories-container');
    const searchInput = document.getElementById('search-input');
    
    const gameModal = document.getElementById('game-modal');
    const gameIframe = document.getElementById('game-iframe');
    const emptyUrlMsg = document.getElementById('empty-url-msg');
    const modalTitle = document.getElementById('modal-title');
    const modalIcon = document.getElementById('modal-icon');

    // 1️⃣ 渲染分类按钮
    function renderCategories() {
      categoriesContainer.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        // 判断是不是当前选中的分类，给不同的颜色
        if (cat === currentCategory) {
          btn.className = 'px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white shadow-md whitespace-nowrap';
        } else {
          btn.className = 'px-4 py-1.5 rounded-lg text-sm font-medium bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 whitespace-nowrap transition-colors';
        }
        // 点击分类时触发刷新
        btn.onclick = () => {
          currentCategory = cat;
          renderCategories();
          renderGames();
        };
        categoriesContainer.appendChild(btn);
      });
    }

    // 2️⃣ 渲染游戏卡片
    function renderGames() {
      gamesGrid.innerHTML = '';
      
      // 过滤游戏（根据分类和搜索词）
      const filteredGames = myGames.filter(game => {
        const matchCategory = currentCategory === '全部' || game.category === currentCategory;
        const matchSearch = game.title.includes(searchQuery) || game.desc.includes(searchQuery);
        return matchCategory && matchSearch;
      });

      if (filteredGames.length === 0) {
        gamesGrid.innerHTML = `
          <div class="col-span-full text-center py-16 text-slate-500">
            <div class="text-4xl mb-3">🕵️‍♂️</div>
            <p class="text-sm">没有找到匹配的游戏哦...</p>
          </div>
        `;
        return;
      }

      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl p-4 md:p-5 shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col cursor-pointer';
        card.onclick = () => openGame(game); // 点击卡片打开游戏

        card.innerHTML = `
          <div class="flex items-start justify-between mb-3">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center text-3xl bg-indigo-50 shadow-inner">
              ${game.icon}
            </div>
            <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-md">
              ${game.category}
            </span>
          </div>
          <h3 class="text-base font-bold text-slate-800 mb-1.5">${game.title}</h3>
          <p class="text-slate-500 text-xs mb-4 flex-1 line-clamp-2 leading-relaxed">${game.desc}</p>
          <button class="w-full bg-slate-800 hover:bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium transition-colors">
            ▶ 开始游玩
          </button>
        `;
        gamesGrid.appendChild(card);
      });
    }

    // 3️⃣ 打开游戏逻辑
    function openGame(game) {
      modalTitle.innerText = game.title;
      modalIcon.innerText = game.icon;
      gameModal.classList.remove('hidden');
      gameModal.classList.add('flex');
      
      document.body.style.overflow = 'hidden'; // 背景禁止滚动

      if (game.url) {
        // 如果有链接，显示 iframe
        gameIframe.src = game.url;
        gameIframe.classList.remove('hidden');
        emptyUrlMsg.classList.add('hidden');
      } else {
        // 如果没链接，显示提示文字
        gameIframe.src = '';
        gameIframe.classList.add('hidden');
        emptyUrlMsg.classList.remove('hidden');
      }
    }

    // 4️⃣ 关闭游戏逻辑
    function closeGame() {
      gameModal.classList.add('hidden');
      gameModal.classList.remove('flex');
      gameIframe.src = ''; // 清空 iframe，让游戏停止运行
      document.body.style.overflow = 'auto'; // 恢复滚动
    }

    // 5️⃣ 监听搜索框输入
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderGames();
    });

    // 页面加载完成后，初始化渲染
    renderCategories();
    renderGames();

  </script>
</body>
</html>
