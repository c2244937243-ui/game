<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D地球 · 极致精雕版</title>
    <style>
        /* 保持简洁样式 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(10, 20, 30, 0.7);
            padding: 8px 22px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            font-size: 16px;
            border: 1px solid #4a8cbb;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            color: white;
            border: 1px solid #5a9eff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            z-index: 200;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: all;
            border-bottom: 3px solid #3a7bd5;
        }
        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item label {
            font-size: 14px;
            color: #b0d0ff;
            font-weight: 500;
        }
        .control-item input[type="range"] {
            width: 110px;
            height: 5px;
            background: #2a4055;
            border-radius: 5px;
            outline: none;
            accent-color: #5a9eff;
        }
        .control-item span {
            min-width: 40px;
            text-align: center;
            color: #ffd966;
            font-weight: 600;
            font-size: 14px;
        }
        button {
            background: #2e4a6a;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 2px solid #0d1a2a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:hover {
            background: #3e6a9a;
            transform: translateY(-1px);
        }
        button.active {
            background: #5a9eff;
            color: black;
            border-bottom-color: #003366;
        }
        #coordinates {
            position: absolute;
            bottom: 120px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid #5a9eff55;
            z-index: 100;
        }
        #pauseBtn {
            background: #5a9eff;
            color: black;
            font-weight: bold;
            border-bottom-color: #003366;
        }
    </style>
</head>
<body>
    <div id="info">🌍 精雕地球 · 极致版</div>
    <div id="coordinates">🖱️ 指向: --° N, --° E</div>

    <div id="controls">
        <div class="control-item">
            <label>自转速度</label>
            <input type="range" id="rotateSpeed" min="0" max="0.0015" step="0.0001" value="0.0003">
            <span id="speedValue">0.0003</span>
        </div>
        <div class="control-item">
            <label>地形凸显</label>
            <input type="range" id="displaceScale" min="0" max="0.3" step="0.01" value="0.1">
            <span id="displaceValue">0.10</span>
        </div>
        <div class="control-item">
            <label>时间滑块</label>
            <input type="range" id="timeSlider" min="0" max="100" value="0">
            <span id="timeValue">0</span>
        </div>
        <div style="display: flex; gap: 8px;">
            <button id="texDay" class="active">日间</button>
            <button id="texNight">夜间</button>
            <button id="texGeo">地质</button>
            <button id="pauseBtn">⏸️ 暂停自转</button>
        </div>
    </div>

    <!-- 引入 Three.js 核心库和附加组件 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "topojson-client": "https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as topojson from 'topojson-client';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 轨道控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.maxDistance = 30;
        controls.minDistance = 8;
        controls.target.set(0, 0, 0);

        // --- 暂停自转按钮功能 ---
        const pauseBtn = document.getElementById('pauseBtn');
        let autoRotate = true;
        pauseBtn.addEventListener('click', () => {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            pauseBtn.textContent = autoRotate ? '⏸️ 暂停自转' : '▶️ 恢复自转';
        });

        // --- 灯光系统 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        sunLight.position.set(8, 5, 10);
        scene.add(sunLight);
        const backLight = new THREE.DirectionalLight(0x446688, 0.5);
        backLight.position.set(-5, -2, -8);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x335588, 0.3);
        fillLight.position.set(3, 2, 5);
        scene.add(fillLight);

        // --- 星空背景 ---
        function createStars(radius, count, color, size) {
            const geom = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = radius + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i*3] = Math.sin(phi) * Math.cos(theta) * r;
                pos[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
                pos[i*3+2] = Math.cos(phi) * r;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color, size, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
            return new THREE.Points(geom, mat);
        }
        const stars1 = createStars(150, 2000, 0xffffff, 0.3);
        const stars2 = createStars(230, 1500, 0xaaccff, 0.2);
        scene.add(stars1);
        scene.add(stars2);

        // --- 创建圆形纹理（用于所有粒子效果，避免方块）---
        function createRoundTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.8, 'rgba(180,180,180,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }
        const roundTexture = createRoundTexture();

        // --- 地球组 ---
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // --- 纹理加载 ---
        const textureLoader = new THREE.TextureLoader();
        const earthMapDay = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthMapNight = textureLoader.load('https://threejs.org/examples/textures/planets/earth_night_2048.jpg');
        const earthMapGeo = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthBumpMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const cloudTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');

        // --- 地球材质 ---
        const material = new THREE.MeshPhongMaterial({
            map: earthMapDay,
            bumpMap: earthBumpMap,
            bumpScale: 0.05,
            displacementMap: earthBumpMap,
            displacementScale: 0.1,
            specularMap: earthSpecularMap,
            specular: new THREE.Color(0x333333),
            shininess: 8,
            emissive: new THREE.Color(0x000020)
        });

        const earthGeo = new THREE.SphereGeometry(5, 128, 128);
        const earth = new THREE.Mesh(earthGeo, material);
        earth.rotation.y = 2.5;
        earthGroup.add(earth);

        // --- 动态云层 ---
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudTexture,
            transparent: true,
            opacity: 0.35,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const cloudGeo = new THREE.SphereGeometry(5.03, 128, 128);
        const clouds = new THREE.Mesh(cloudGeo, cloudMaterial);
        earthGroup.add(clouds);

        // --- 经纬网格 ---
        const gridMaterial = new THREE.LineBasicMaterial({ color: 0x4488cc, transparent: true, opacity: 0.1 });
        const gridGeo = new THREE.SphereGeometry(5.06, 48, 24);
        const wireframe = new THREE.LineSegments(new THREE.EdgesGeometry(gridGeo), gridMaterial);
        earthGroup.add(wireframe);

        // --- 大气层光晕 ---
        const glowMaterial = new THREE.MeshPhongMaterial({
            color: 0x3399ff,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const glowGeo = new THREE.SphereGeometry(5.12, 64, 64);
        const atmosphere = new THREE.Mesh(glowGeo, glowMaterial);
        earthGroup.add(atmosphere);

        const refractMaterial = new THREE.MeshPhongMaterial({
            color: 0xffaa88,
            transparent: true,
            opacity: 0.03,
            side: THREE.BackSide,
            emissive: 0x331100
        });
        const refractGeo = new THREE.SphereGeometry(5.18, 64, 64);
        const refract = new THREE.Mesh(refractGeo, refractMaterial);
        earthGroup.add(refract);

        // --- 国家边界线 ---
        async function loadCountryBorders() {
            try {
                const response = await fetch('https://unpkg.com/world-atlas@1.1.4/world/110m.json');
                const world = await response.json();
                const countries = topojson.feature(world, world.objects.countries);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
                countries.features.forEach(feature => {
                    const geom = feature.geometry;
                    if (geom.type === 'Polygon') {
                        drawPolygon(geom.coordinates, lineMaterial);
                    } else if (geom.type === 'MultiPolygon') {
                        geom.coordinates.forEach(poly => drawPolygon(poly, lineMaterial));
                    }
                });
            } catch (err) {
                console.warn('边界线加载失败');
            }
        }
        function drawPolygon(coords, material) {
            coords.forEach(ring => {
                const points = ring.map(([lon, lat]) => {
                    const phi = (90 - lat) * Math.PI / 180;
                    const theta = lon * Math.PI / 180;
                    const r = 5.07;
                    return new THREE.Vector3(
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    );
                });
                if (points.length > 1) {
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeo, material);
                    earthGroup.add(line);
                }
            });
        }
        loadCountryBorders();

        // --- 城市灯光 (圆形粒子，增强夜间可见度) ---
        const cityCount = 3500;
        const cityGeom = new THREE.BufferGeometry();
        const cityPositions = new Float32Array(cityCount * 3);
        const cityColors = new Float32Array(cityCount * 3);
        for (let i = 0; i < cityCount; i++) {
            const lat = (Math.random() * 140 - 70) * Math.PI / 180;
            const lon = Math.random() * Math.PI * 2 - Math.PI;
            const r = 5.1;
            const x = r * Math.cos(lat) * Math.cos(lon);
            const y = r * Math.sin(lat);
            const z = r * Math.cos(lat) * Math.sin(lon);
            cityPositions[i*3] = x;
            cityPositions[i*3+1] = y;
            cityPositions[i*3+2] = z;
            // 增加亮度强度范围，并提高饱和度
            const intensity = 0.5 + Math.random() * 0.8; // 原来 0.3-1.0，现在 0.5-1.3
            cityColors[i*3] = Math.min(1.0, 1.0 * intensity);
            cityColors[i*3+1] = Math.min(1.0, 0.9 * intensity);
            cityColors[i*3+2] = Math.min(1.0, 0.5 * intensity);
        }
        cityGeom.setAttribute('position', new THREE.BufferAttribute(cityPositions, 3));
        cityGeom.setAttribute('color', new THREE.BufferAttribute(cityColors, 3));
        const cityMat = new THREE.PointsMaterial({ 
            size: 0.18,  // 从0.12增大到0.18
            map: roundTexture,
            vertexColors: true, 
            transparent: true, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const cities = new THREE.Points(cityGeom, cityMat);
        earthGroup.add(cities);

        // --- 主要城市标记 (球体) ---
        const markers = [
            { lat: 39.9, lon: 116.4 },
            { lat: 40.7, lon: -74.0 },
            { lat: 51.5, lon: -0.1 },
            { lat: 35.7, lon: 139.7 },
            { lat: -33.9, lon: 151.2 }
        ];
        markers.forEach(m => {
            const lat = m.lat * Math.PI/180;
            const lon = m.lon * Math.PI/180;
            const r = 5.15;
            const x = r * Math.cos(lat) * Math.cos(lon);
            const y = r * Math.sin(lat);
            const z = r * Math.cos(lat) * Math.sin(lon);
            const markerMat = new THREE.MeshPhongMaterial({ color: 0xffaa33, emissive: 0x442200 });
            const marker = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8), markerMat);
            marker.position.set(x, y, z);
            earthGroup.add(marker);
        });

        // --- 环绕卫星 ---
        function createSatellite(color, orbitRadius, speed, inclination) {
            const satGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), new THREE.MeshPhongMaterial({ color, emissive: 0x222222 }));
            satGroup.add(body);
            const panelGeo = new THREE.BoxGeometry(0.35, 0.04, 0.15);
            const panelMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
            const panel = new THREE.Mesh(panelGeo, panelMat);
            panel.position.set(0.18, 0, 0);
            satGroup.add(panel);
            const panel2 = panel.clone();
            panel2.position.set(-0.18, 0, 0);
            satGroup.add(panel2);
            
            const points = [];
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                const x = orbitRadius * Math.cos(angle);
                const z = orbitRadius * Math.sin(angle) * Math.cos(inclination);
                const y = orbitRadius * Math.sin(angle) * Math.sin(inclination);
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.1 });
            const orbitLine = new THREE.Line(lineGeo, lineMat);
            scene.add(orbitLine);
            
            satGroup.userData = { orbitRadius, speed, inclination, angle: Math.random() * Math.PI * 2 };
            return satGroup;
        }
        const sat1 = createSatellite(0xffaa44, 7.5, 0.0018, 0.2);
        const sat2 = createSatellite(0x44ffaa, 8.2, 0.0013, 0.5);
        const sat3 = createSatellite(0xaa44ff, 9.0, 0.0009, 0.8);
        scene.add(sat1);
        scene.add(sat2);
        scene.add(sat3);

        // --- 流星雨 (圆形粒子) ---
        const meteorCount = 20;
        const meteorGeom = new THREE.BufferGeometry();
        const meteorPositions = new Float32Array(meteorCount * 3);
        const meteorSpeeds = [];
        for (let i = 0; i < meteorCount; i++) {
            meteorPositions[i*3] = (Math.random() - 0.5) * 200;
            meteorPositions[i*3+1] = (Math.random() - 0.5) * 200;
            meteorPositions[i*3+2] = (Math.random() - 0.5) * 200;
            meteorSpeeds.push({
                x: (Math.random() - 0.5) * 0.08,
                y: (Math.random() - 0.5) * 0.08,
                z: (Math.random() - 0.5) * 0.08
            });
        }
        meteorGeom.setAttribute('position', new THREE.BufferAttribute(meteorPositions, 3));
        const meteorMat = new THREE.PointsMaterial({ color: 0xffdd88, size: 0.35, map: roundTexture, blending: THREE.AdditiveBlending });
        const meteors = new THREE.Points(meteorGeom, meteorMat);
        scene.add(meteors);

        // --- 飞机航线 ---
        const routePoints = [
            { from: [40.7, -74.0], to: [51.5, -0.1] },
            { from: [35.7, 139.7], to: [37.6, -122.4] },
            { from: [-33.9, 151.2], to: [34.0, 118.2] }
        ];
        function greatCirclePoints(lat1, lon1, lat2, lon2, segments = 40) {
            const points = [];
            const φ1 = lat1 * Math.PI/180, λ1 = lon1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180, λ2 = lon2 * Math.PI/180;
            const d = 2 * Math.asin(Math.sqrt(Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2));
            for (let i = 0; i <= segments; i++) {
                const f = i / segments;
                const A = Math.sin((1-f)*d) / Math.sin(d);
                const B = Math.sin(f*d) / Math.sin(d);
                const x = A * Math.cos(φ1) * Math.cos(λ1) + B * Math.cos(φ2) * Math.cos(λ2);
                const y = A * Math.cos(φ1) * Math.sin(λ1) + B * Math.cos(φ2) * Math.sin(λ2);
                const z = A * Math.sin(φ1) + B * Math.sin(φ2);
                const θ = Math.atan2(y, x);
                const φ = Math.atan2(z, Math.sqrt(x*x + y*y));
                const r = 5.2;
                const px = r * Math.cos(φ) * Math.cos(θ);
                const py = r * Math.sin(φ);
                const pz = r * Math.cos(φ) * Math.sin(θ);
                points.push(new THREE.Vector3(px, py, pz));
            }
            return points;
        }
        routePoints.forEach(r => {
            const pts = greatCirclePoints(r.from[0], r.from[1], r.to[0], r.to[1]);
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.4 }));
            scene.add(line);
            
            const plane = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.25, 6), new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x442200 }));
            plane.position.copy(pts[0]);
            scene.add(plane);
            plane.userData = { route: pts, idx: 0, speed: 0.003 + Math.random()*0.002 };
        });

        // --- 洋流动画 (圆形粒子) ---
        const currentParticles = new THREE.BufferGeometry();
        const currentPositions = [];
        for (let i = 0; i < 300; i++) {
            const lat = (Math.random() * 140 - 70) * Math.PI/180;
            const lon = Math.random() * Math.PI*2;
            const r = 5.1;
            currentPositions.push(r * Math.cos(lat)*Math.cos(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.sin(lon));
        }
        currentParticles.setAttribute('position', new THREE.Float32BufferAttribute(currentPositions, 3));
        const currentMat = new THREE.PointsMaterial({ 
            color: 0x3399ff, 
            size: 0.15, 
            map: roundTexture,
            transparent: true, 
            opacity: 0.6, 
            blending: THREE.AdditiveBlending 
        });
        const currents = new THREE.Points(currentParticles, currentMat);
        earthGroup.add(currents);
        currents.userData = { offset: 0 };

        // --- 板块边界 ---
        const plateMaterial = new THREE.LineBasicMaterial({ color: 0xff5533, opacity: 0.2, transparent: true });
        for (let i = 0; i < 8; i++) {
            const pts = [];
            for (let j = 0; j <= 20; j++) {
                const t = j/20;
                const lat = 30 * Math.sin(t*Math.PI*2 + i) * Math.PI/180;
                const lon = (t*360 - 180) * Math.PI/180;
                const r = 5.08;
                const x = r * Math.cos(lat)*Math.cos(lon);
                const y = r * Math.sin(lat);
                const z = r * Math.cos(lat)*Math.sin(lon);
                pts.push(new THREE.Vector3(x, y, z));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geom, plateMaterial);
            earthGroup.add(line);
        }

        // --- 地震带热力图 (圆形粒子) ---
        const quakeGeom = new THREE.BufferGeometry();
        const quakePos = [];
        for (let i = 0; i < 400; i++) {
            const lat = (Math.random() * 120 - 60) * Math.PI/180;
            const lon = Math.random() * Math.PI*2;
            const r = 5.15;
            quakePos.push(r * Math.cos(lat)*Math.cos(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.sin(lon));
        }
        quakeGeom.setAttribute('position', new THREE.Float32BufferAttribute(quakePos, 3));
        const quakeMat = new THREE.PointsMaterial({ 
            color: 0xff3333, 
            size: 0.18, 
            map: roundTexture,
            transparent: true, 
            blending: THREE.AdditiveBlending 
        });
        const quakes = new THREE.Points(quakeGeom, quakeMat);
        earthGroup.add(quakes);

        // --- 风场粒子 (圆形粒子) ---
        const windGeom = new THREE.BufferGeometry();
        const windPos = [];
        for (let i = 0; i < 600; i++) {
            const lat = (Math.random() * 140 - 70) * Math.PI/180;
            const lon = Math.random() * Math.PI*2;
            const r = 5.2;
            windPos.push(r * Math.cos(lat)*Math.cos(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.sin(lon));
        }
        windGeom.setAttribute('position', new THREE.Float32BufferAttribute(windPos, 3));
        const windMat = new THREE.PointsMaterial({ 
            color: 0xaaccff, 
            size: 0.12, 
            map: roundTexture,
            transparent: true, 
            opacity: 0.6 
        });
        const winds = new THREE.Points(windGeom, windMat);
        earthGroup.add(winds);

        // --- 时间滑块 ---
        const timeSlider = document.getElementById('timeSlider');
        const timeSpan = document.getElementById('timeValue');
        timeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            timeSpan.innerText = val;
            material.bumpScale = 0.02 + val/100 * 0.15;
        });

        // --- 极光效果 (优化版) ---
        function createAurora(colorBase, latCenter, count = 150) {
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const lat = latCenter + (Math.random() - 0.5) * 25;
                const lon = Math.random() * 360 - 180;
                const r = 5.25 + Math.random() * 0.3;
                const phi = (90 - lat) * Math.PI/180;
                const theta = lon * Math.PI/180;
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.cos(phi);
                positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
                
                const mix = Math.random();
                const rCol = colorBase.r * (1 - mix) + mix;
                const gCol = colorBase.g * (1 - mix) + mix;
                const bCol = colorBase.b * (1 - mix) + mix;
                colors[i*3] = rCol;
                colors[i*3+1] = gCol;
                colors[i*3+2] = bCol;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.4,
                map: roundTexture,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.7
            });
            const points = new THREE.Points(geom, mat);
            points.userData = { speed: 0.0002 + Math.random()*0.0002, offset: 0 };
            return points;
        }

        const northAurora = createAurora(new THREE.Color(0x88ff88), 70, 150);
        const southAurora = createAurora(new THREE.Color(0xff88aa), -70, 150);
        earthGroup.add(northAurora);
        earthGroup.add(southAurora);

        // --- 温室气体浓度 ---
        const gasGeo = new THREE.SphereGeometry(5.35, 32, 32);
        const gasMat = new THREE.MeshPhongMaterial({
            color: 0xcc6666,
            transparent: true,
            opacity: 0.06,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        const gasLayer = new THREE.Mesh(gasGeo, gasMat);
        earthGroup.add(gasLayer);

        // --- 人口密度热力图 (圆形粒子) ---
        const densityGeom = new THREE.BufferGeometry();
        const densityPos = [];
        const densityCol = [];
        for (let i = 0; i < 2500; i++) {
            const lat = (Math.random() * 140 - 70) * Math.PI/180;
            const lon = Math.random() * Math.PI*2;
            const r = 5.12;
            const x = r * Math.cos(lat)*Math.cos(lon);
            const y = r * Math.sin(lat);
            const z = r * Math.cos(lat)*Math.sin(lon);
            densityPos.push(x, y, z);
            const hot = Math.random();
            densityCol.push(hot, 0.2, 0.2);
        }
        densityGeom.setAttribute('position', new THREE.Float32BufferAttribute(densityPos, 3));
        densityGeom.setAttribute('color', new THREE.Float32BufferAttribute(densityCol, 3));
        const densityMat = new THREE.PointsMaterial({ 
            size: 0.15, 
            map: roundTexture,
            vertexColors: true, 
            transparent: true, 
            blending: THREE.AdditiveBlending 
        });
        const densityPoints = new THREE.Points(densityGeom, densityMat);
        earthGroup.add(densityPoints);

        // --- 互联网光缆 ---
        for (let i = 0; i < 12; i++) {
            const lat1 = (Math.random()*120-60)*Math.PI/180;
            const lon1 = Math.random()*Math.PI*2;
            const lat2 = (Math.random()*120-60)*Math.PI/180;
            const lon2 = Math.random()*Math.PI*2;
            const r = 5.1;
            const p1 = new THREE.Vector3(r*Math.cos(lat1)*Math.cos(lon1), r*Math.sin(lat1), r*Math.cos(lat1)*Math.sin(lon1));
            const p2 = new THREE.Vector3(r*Math.cos(lat2)*Math.cos(lon2), r*Math.sin(lat2), r*Math.cos(lat2)*Math.sin(lon2));
            const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x44ddff, opacity: 0.2, transparent: true }));
            earthGroup.add(line);
        }

        // --- 历史事件标记 ---
        const events = [
            { lat: 30.0, lon: 31.2 },
            { lat: 37.9, lon: 23.7 },
            { lat: 41.9, lon: 12.5 }
        ];
        events.forEach(e => {
            const lat = e.lat*Math.PI/180, lon = e.lon*Math.PI/180;
            const r = 5.2;
            const x = r*Math.cos(lat)*Math.cos(lon);
            const y = r*Math.sin(lat);
            const z = r*Math.cos(lat)*Math.sin(lon);
            const flagMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const flag = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.25, 6), flagMat);
            flag.position.set(x, y, z);
            earthGroup.add(flag);
        });

        // --- 太空垃圾 (圆形粒子) ---
        const debrisGeom = new THREE.BufferGeometry();
        const debrisPos = [];
        for (let i = 0; i < 150; i++) {
            const r = 7 + Math.random()*3;
            const theta = Math.random()*Math.PI*2;
            const phi = Math.acos(2*Math.random()-1);
            debrisPos.push(
                r * Math.sin(phi)*Math.cos(theta),
                r * Math.sin(phi)*Math.sin(theta),
                r * Math.cos(phi)
            );
        }
        debrisGeom.setAttribute('position', new THREE.Float32BufferAttribute(debrisPos, 3));
        const debrisMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.15, map: roundTexture });
        const debris = new THREE.Points(debrisGeom, debrisMat);
        scene.add(debris);

        // --- 台风模拟 (圆形粒子 + 旋转动画) ---
        const typhoonGeom = new THREE.BufferGeometry();
        const typhoonPos = [];
        const typhoonCount = 300; // 增加粒子数
        for (let i = 0; i < typhoonCount; i++) {
            // 东南亚区域 (纬度 5-25°N, 经度 100-140°E)
            const lat = 10 + Math.random() * 20;
            const lon = 110 + Math.random() * 30;
            const r = 5.2 + (Math.random() - 0.5) * 0.3; // 高度变化
            const phi = (90 - lat) * Math.PI/180;
            const theta = lon * Math.PI/180;
            // 添加围绕中心的随机偏移，模拟螺旋
            const offsetAngle = Math.random() * Math.PI * 2;
            const offsetDist = Math.random() * 0.8;
            const offsetX = Math.cos(offsetAngle) * offsetDist * 0.2;
            const offsetY = Math.sin(offsetAngle) * offsetDist * 0.2;
            const offsetZ = 0; // 简化
            typhoonPos.push(
                r * Math.sin(phi) * Math.cos(theta) + offsetX,
                r * Math.cos(phi) + offsetY,
                r * Math.sin(phi) * Math.sin(theta)
            );
        }
        typhoonGeom.setAttribute('position', new THREE.Float32BufferAttribute(typhoonPos, 3));
        const typhoonMat = new THREE.PointsMaterial({ 
            color: 0x88aaff, 
            size: 0.25, 
            map: roundTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.8
        });
        const typhoon = new THREE.Points(typhoonGeom, typhoonMat);
        earthGroup.add(typhoon);
        typhoon.userData = { angle: 0 };

        // --- 动物迁徙路线 ---
        const migrationPoints = [
            { from: [65, -150], to: [30, -120] },
            { from: [-20, 35], to: [-10, 50] }
        ];
        migrationPoints.forEach(r => {
            const pts = greatCirclePoints(r.from[0], r.from[1], r.to[0], r.to[1], 25);
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x88dd88, opacity: 0.3, transparent: true }));
            scene.add(line);
        });

        // --- 地磁场线 ---
        const fieldLinesMat = new THREE.LineBasicMaterial({ color: 0x66ccff, opacity: 0.1, transparent: true });
        for (let k = 0; k < 6; k++) {
            const lon = (k/6)*Math.PI*2;
            const pts = [];
            for (let lat = -80; lat <= 80; lat += 10) {
                const phi = (90 - lat)*Math.PI/180;
                const theta = lon;
                const r = 5.3 + 0.15*Math.sin(lat*Math.PI/180 * 4);
                const x = r * Math.sin(phi)*Math.cos(theta);
                const y = r * Math.cos(phi);
                const z = r * Math.sin(phi)*Math.sin(theta);
                pts.push(new THREE.Vector3(x, y, z));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geom, fieldLinesMat);
            earthGroup.add(line);
        }

        // --- 卫星信息交互 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([sat1, sat2, sat3]);
            if (intersects.length > 0) {
                alert('卫星: 轨道高度 ' + intersects[0].object.userData.orbitRadius.toFixed(1) + ' (模拟)');
            }
        });

        // --- 坐标显示 ---
        const coordDiv = document.getElementById('coordinates');
        const raycasterMouse = new THREE.Raycaster();
        const mouseVec = new THREE.Vector2();
        renderer.domElement.addEventListener('mousemove', (event) => {
            mouseVec.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouseVec.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycasterMouse.setFromCamera(mouseVec, camera);
            const hits = raycasterMouse.intersectObject(earth);
            if (hits.length > 0) {
                const point = hits[0].point;
                const x = point.x, y = point.y, z = point.z;
                const r = Math.sqrt(x*x + y*y + z*z);
                const lat = Math.asin(y / r) * 180 / Math.PI;
                const lon = Math.atan2(z, x) * 180 / Math.PI;
                coordDiv.innerHTML = `🖱️ 指向: ${lat.toFixed(2)}° N, ${lon.toFixed(2)}° E`;
            }
        });

        // --- UI 绑定 ---
        const speedSlider = document.getElementById('rotateSpeed');
        const speedSpan = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => speedSpan.innerText = parseFloat(e.target.value).toFixed(4));

        const displaceSlider = document.getElementById('displaceScale');
        const displaceSpan = document.getElementById('displaceValue');
        displaceSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            material.displacementScale = val;
            displaceSpan.innerText = val.toFixed(2);
        });

        // 纹理切换时保持城市灯光可见，无需额外操作
        document.getElementById('texDay').addEventListener('click', () => { material.map = earthMapDay; material.needsUpdate = true; });
        document.getElementById('texNight').addEventListener('click', () => { material.map = earthMapNight; material.needsUpdate = true; });
        document.getElementById('texGeo').addEventListener('click', () => { material.map = earthMapGeo; material.needsUpdate = true; });

        // --- 动画循环 ---
        function animate() {
            const rotSpeed = parseFloat(speedSlider.value);
            earthGroup.rotation.y += rotSpeed;
            clouds.rotation.y += rotSpeed * 1.2;

            // 卫星
            [sat1, sat2, sat3].forEach(sat => {
                sat.userData.angle += sat.userData.speed;
                const r = sat.userData.orbitRadius;
                const incl = sat.userData.inclination;
                const a = sat.userData.angle;
                sat.position.x = r * Math.cos(a);
                sat.position.z = r * Math.sin(a) * Math.cos(incl);
                sat.position.y = r * Math.sin(a) * Math.sin(incl);
            });

            // 流星
            const mpos = meteors.geometry.attributes.position.array;
            for (let i = 0; i < meteorCount; i++) {
                mpos[i*3] += meteorSpeeds[i].x;
                mpos[i*3+1] += meteorSpeeds[i].y;
                mpos[i*3+2] += meteorSpeeds[i].z;
                if (Math.abs(mpos[i*3]) > 120) mpos[i*3] = (Math.random()-0.5)*100;
                if (Math.abs(mpos[i*3+1]) > 120) mpos[i*3+1] = (Math.random()-0.5)*100;
                if (Math.abs(mpos[i*3+2]) > 120) mpos[i*3+2] = (Math.random()-0.5)*100;
            }
            meteors.geometry.attributes.position.needsUpdate = true;

            // 洋流旋转
            currents.rotation.y += 0.0005;

            // 极光缓慢旋转
            northAurora.rotation.y += 0.0001;
            southAurora.rotation.y -= 0.0001;

            // 台风旋转 (模拟气旋)
            typhoon.rotation.y += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animate);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
